<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, orderBy, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
const app = initializeApp({
  apiKey:"AIzaSyBjnICflVU6VTAfcTxbCaKEb2DbZLuHddM",
  authDomain:"yuljeong7-3e56b.firebaseapp.com",
  projectId:"yuljeong7-3e56b",
  storageBucket:"yuljeong7-3e56b.firebasestorage.app",
  messagingSenderId:"245660321597",
  appId:"1:245660321597:web:04a21998831221b9ade754"
});
const db = getFirestore(app);
const DONGS=['701동','702동','703동','704동','705동','706동','707동','708동','709동','710동','711동','712동','713동','714동'];

// 공가앱 구독
window.fbSubscribe = cb => onSnapshot(doc(db,'aptData','main'),
  s=>{if(s.exists())try{cb(JSON.parse(s.data().db||'{}'));}catch(e){}}, e=>console.warn(e));

// 코티스 머지 (동별 분리)
window.fbMergeKotis = async (dk, newData) => {
  try{
    const byDong={};
    Object.entries(newData).forEach(([key,items])=>{
      const dong=key.split('_')[0];
      if(!byDong[dong])byDong[dong]={};
      if(!byDong[dong][key])byDong[dong][key]={};
      items.forEach(item=>{if(item.seqNo)byDong[dong][key][item.seqNo]=item;});
    });
    let added=0,updated=0,changed=[];
    for(const dong of Object.keys(byDong)){
      const ref=doc(db,'kotisAccumulated',dong);
      const snap=await getDoc(ref);
      let acc={};
      if(snap.exists())try{acc=JSON.parse(snap.data().data||'{}');}catch(e){}
      Object.entries(byDong[dong]).forEach(([key,seqMap])=>{
        if(!acc[key])acc[key]={};
        Object.values(seqMap).forEach(item=>{
          const ex=acc[key][item.seqNo];
          if(!ex){acc[key][item.seqNo]={...item,firstSeen:dk,lastSeen:dk,lastStatus:item.status};added++;}
          else{
            if(ex.lastStatus&&ex.lastStatus!==item.status)
              changed.push({key,seqNo:item.seqNo,dong:item.dong,ho:item.ho,
                from:ex.lastStatus,to:item.status,content:item.content,
                manager:item.manager,bizName:item.bizName||'',date:dk});
            acc[key][item.seqNo]={...ex,...item,firstSeen:ex.firstSeen,lastSeen:dk,lastStatus:item.status};
            updated++;
          }
        });
      });
      await setDoc(ref,{data:JSON.stringify(acc),updatedAt:new Date().toISOString(),lastDateKey:dk});
    }
    await setDoc(doc(db,'kotisAccumulated','_meta'),{lastDateKey:dk,updatedAt:new Date().toISOString()});
    if(changed.length){
      const prev=await getDoc(doc(db,'kotisChanges','latest'));
      let all=[];
      if(prev.exists())try{all=JSON.parse(prev.data().data||'[]');}catch(e){}
      all=[...changed,...all].slice(0,500);
      await setDoc(doc(db,'kotisChanges','latest'),{data:JSON.stringify(all),updatedAt:new Date().toISOString()});
    }
    // 자재 자동 차감 (보수구분=자재사용)
    await window.fbAutoDeductMaterials(dk, newData);
    return {added,updated,changed:changed.length};
  }catch(e){console.warn(e);if(window.LOG)LOG('머지오류:'+e.message);return null;}
};

// 누적 로드
window.fbLoadAccumulated = async () => {
  try{
    const result={};let lastDateKey='-';
    try{const m=await getDoc(doc(db,'kotisAccumulated','_meta'));if(m.exists())lastDateKey=m.data().lastDateKey||'-';}catch(e){}
    const snaps=await Promise.all(DONGS.map(d=>getDoc(doc(db,'kotisAccumulated',d))));
    snaps.forEach(s=>{if(!s.exists())return;try{const r=JSON.parse(s.data().data||'{}');Object.keys(r).forEach(k=>result[k]=Object.values(r[k]));}catch(e){}});
    return Object.keys(result).length?{data:result,lastDateKey}:null;
  }catch(e){return null;}
};

window.fbSaveKotis = async (dk,data,parsed,cnt) => {
  try{await setDoc(doc(db,'kotisHistory',dk),{data:JSON.stringify(data),savedAt:new Date().toISOString(),dateKey:dk,parsed,unitCnt:cnt});return true;}catch(e){return false;}
};
window.fbLoadChanges = async () => {
  try{const s=await getDoc(doc(db,'kotisChanges','latest'));if(s.exists())return JSON.parse(s.data().data||'[]');}catch(e){}return[];
};
window.fbSaveMemo = async (key,entry) => {
  try{
    const ref=doc(db,'unitMemos',key.replace(/\s/g,'_'));
    const snap=await getDoc(ref);
    let memos=[];if(snap.exists())try{memos=JSON.parse(snap.data().data||'[]');}catch(e){}
    memos.unshift(entry);
    await setDoc(ref,{data:JSON.stringify(memos),updatedAt:new Date().toISOString()});
    return memos;
  }catch(e){return null;}
};
window.fbLoadMemos = async (key) => {
  try{const s=await getDoc(doc(db,'unitMemos',key.replace(/\s/g,'_')));if(s.exists())return JSON.parse(s.data().data||'[]');}catch(e){}return[];
};
window.fbResetAccumulated = async () => {
  await Promise.all([...DONGS,'_meta'].map(d=>deleteDoc(doc(db,'kotisAccumulated',d)).catch(()=>{})));
};

// ── 자재 Firebase
window.fbLoadMaterials = async () => {
  try{const s=await getDoc(doc(db,'materials','main'));if(s.exists())return JSON.parse(s.data().data||'[]');}catch(e){}return null;
};
window.fbSaveMaterials = async (list) => {
  try{await setDoc(doc(db,'materials','main'),{data:JSON.stringify(list),updatedAt:new Date().toISOString()});return true;}catch(e){console.warn(e);return false;}
};
window.fbSaveMaterialLog = async (entry) => {
  try{
    const ref=doc(db,'materialLog','main');
    const snap=await getDoc(ref);
    let logs=[];if(snap.exists())try{logs=JSON.parse(snap.data().data||'[]');}catch(e){}
    logs.unshift(entry);logs=logs.slice(0,1000);
    await setDoc(ref,{data:JSON.stringify(logs),updatedAt:new Date().toISOString()});return true;
  }catch(e){return false;}
};
window.fbLoadMaterialLog = async () => {
  try{const s=await getDoc(doc(db,'materialLog','main'));if(s.exists())return JSON.parse(s.data().data||'[]');}catch(e){}return[];
};

// 자재 자동 차감
window.fbAutoDeductMaterials = async (dk, newData) => {
  try{
    const matList=await window.fbLoadMaterials();
    if(!matList||!matList.length)return;
    const unmatched=[];
    const deductions=[];
    Object.entries(newData).forEach(([key,items])=>{
      const [dong,ho]=key.split('_');
      items.filter(it=>it.bsuBun==='자재사용'||it.repairType==='자재사용').forEach(it=>{
        const content=it.content||'';
        // 품명 매칭
        let matched=null;let qty=1;
        const qm=content.match(/(\d+)\s*개/);if(qm)qty=parseInt(qm[1]);
        for(const m of matList){
          const name=m.pumyeong+(m.gyugyeok?` ${m.gyugyeok}`:'');
          if(content.includes(m.pumyeong)){matched=m;break;}
        }
        if(matched){
          deductions.push({no:matched.no,qty,dong,ho,seqNo:it.seqNo,content,date:dk});
        } else {
          unmatched.push({dong,ho,seqNo:it.seqNo,content,date:dk});
        }
      });
    });
    if(deductions.length){
      deductions.forEach(d=>{
        const m=matList.find(x=>x.no===d.no);
        if(m){m.stock=Math.max(0,(m.stock||0)-d.qty);
          if(!m.log)m.log=[];
          m.log.unshift({type:'출고',qty:-d.qty,reason:`코티스자동: ${d.dong} ${d.ho}호 ${d.content}`,date:d.date,seqNo:d.seqNo});
          m.log=m.log.slice(0,50);
        }
      });
      await window.fbSaveMaterials(matList);
    }
    if(unmatched.length){
      const ref=doc(db,'materialUnmatched','main');
      const snap=await getDoc(ref);
      let prev=[];if(snap.exists())try{prev=JSON.parse(snap.data().data||'[]');}catch(e){}
      prev=[...unmatched,...prev].slice(0,200);
      await setDoc(ref,{data:JSON.stringify(prev),updatedAt:new Date().toISOString()});
    }
  }catch(e){console.warn('자재차감오류',e);}
};
window.fbLoadUnmatched = async () => {
  try{const s=await getDoc(doc(db,'materialUnmatched','main'));if(s.exists())return JSON.parse(s.data().data||'[]');}catch(e){}return[];
};

window._fbReady=true;
document.dispatchEvent(new Event('fbReady'));
</script>

.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surf);border-radius:14px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.18);overflow:hidden;}
.mh{padding:12px 16px;background:var(--surf2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mh-t{font-size:14px;font-weight:800;}
.mb{padding:14px 16px;}
.mf{display:flex;justify-content:flex-end;gap:6px;padding:10px 16px;border-top:1px solid var(--border);}
.minput{width:100%;padding:8px;border:1.5px solid var(--border2);border-radius:7px;font-size:12px;font-family:inherit;outline:none;margin-bottom:8px;}
.minput:focus{border-color:var(--accent2);}
.mlabel{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:3px;display:block;}

input[type=date],input[type=number]{padding:5px 7px;border:1.5px solid var(--border2);border-radius:7px;font-size:11px;font-family:inherit;background:var(--surf);color:var(--t1);outline:none;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(8px);background:#1e293b;color:#fff;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:1000;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
@media(max-width:600px){.info-grid{grid-template-columns:1fr;}.ana-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="wrap">

<!-- 헤더 -->
<div class="hd">
  <div>
    <div class="hd-title">🏘️ 율정7단지 하자·자재 관리</div>
    <div class="hd-sub" id="hdSub">데이터를 불러오세요</div>
  </div>
  <div class="hd-right">
    <input type="file" id="fk" accept=".xls,.xlsx" multiple style="display:none" onchange="onFiles(event)">
    <div class="upc" id="cFB" onclick="connectFB()">🔥 <span id="iFB">Firebase 연결</span></div>
    <div class="upc" id="cKotis" onclick="document.getElementById('fk').click()">📡 <span id="iKotis">코티스 업로드</span></div>
    <input type="date" id="kDate">
    <button class="btn bd" onclick="resetAcc()">🗑️</button>
  </div>
</div>

<!-- 요약 칩 -->
<div class="chip-row" id="chipRow">
  <span class="chip ch-g">로딩 중...</span>
</div>

<!-- 탭 -->
<div class="tabs">
  <button class="tab on" id="tab-list"    onclick="showTab('list')">📋 미처리 목록</button>
  <button class="tab"    id="tab-change"  onclick="showTab('change')">🔄 변화 이력</button>
  <button class="tab"    id="tab-ana"     onclick="showTab('ana')">📊 분석</button>
  <button class="tab"    id="tab-mat"     onclick="showTab('mat')">🔧 자재 관리</button>
</div>

<!-- ① 미처리 목록 탭 -->
<div id="tab-list-content">
  <div class="layout">
    <!-- 목록 -->
    <div class="list-panel">
      <div class="lp-head">
        <input class="lf" id="searchInput" placeholder="동·호수 / 접수번호 검색" oninput="onSearch(this.value)">
        <div id="searchRes" style="position:relative"></div>
      </div>
      <div style="display:flex;gap:2px;padding:5px 8px;border-bottom:1px solid var(--border);">
        <button class="btn bg" style="flex:1;font-size:10px" id="ft-all"     onclick="setF('all')">전체</button>
        <button class="btn bg" style="flex:1;font-size:10px" id="ft-urgent"  onclick="setF('urgent')">🔴긴급</button>
        <button class="btn bg" style="flex:1;font-size:10px" id="ft-changed" onclick="setF('changed')">🟡변화</button>
        <button class="btn bg" style="flex:1;font-size:10px" id="ft-vaka"    onclick="setF('vaka')">🔵공가</button>
      </div>
      <div class="list-body" id="listBody"></div>
    </div>
    <!-- 상세 -->
    <div class="detail-panel" id="detailPanel">
      <div class="d-empty">
        <div style="font-size:40px;margin-bottom:10px">📋</div>
        <div style="font-size:13px;font-weight:700;margin-bottom:6px">세대를 선택하세요</div>
        <div style="font-size:12px;line-height:1.8;color:var(--t4)">목록에서 세대를 클릭하면<br>하자이력·변화·메모를 볼 수 있어요</div>
      </div>
    </div>
  </div>
</div>

<!-- ② 변화 이력 탭 -->
<div id="tab-change-content" style="display:none">
  <div id="changeContent" style="background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:14px;">
    <div style="color:var(--t4);text-align:center;padding:30px">로딩 중...</div>
  </div>
</div>

<!-- ③ 분석 탭 -->
<div id="tab-ana-content" style="display:none">
  <div id="anaContent" style="background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:14px;">
    <div style="color:var(--t4);text-align:center;padding:30px">로딩 중...</div>
  </div>
</div>

<!-- ④ 자재 관리 탭 -->
<div id="tab-mat-content" style="display:none">
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
    <button class="btn bp" onclick="showMatAll()">전체</button>
    <button class="btn bg" onclick="showMatFilter('전기')">전기</button>
    <button class="btn bg" onclick="showMatFilter('기계')">기계</button>
    <button class="btn bg" onclick="showMatFilter('건축')">건축</button>
    <button class="btn bg" onclick="showMatFilter('토목')">토목</button>
    <button class="btn bo" onclick="showUnmatched()">⚠️ 미매칭</button>
    <button class="btn bg" onclick="showMatLog()">📋 이력</button>
    <input class="lf" id="matSearch" placeholder="품명 검색" oninput="filterMat(this.value)" style="max-width:180px;">
  </div>
  <div id="matContent"></div>
</div>

</div><!-- /wrap -->

<!-- 자재 입출고 모달 -->
<div class="modal-bg" id="matModal">
  <div class="modal">
    <div class="mh"><div class="mh-t" id="matModalTitle">자재 수정</div><button class="btn bg" onclick="closeMatModal()">✕</button></div>
    <div class="mb" id="matModalBody"></div>
    <div class="mf">

      <button class="btn bp" id="matModalOk" onclick="confirmMat()">확인</button>
    </div>
  </div>
</div>

<div id="toast"></div>

const pad=n=>String(n).padStart(2,'0');
const toDay=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const nowStr=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function LOG(m){console.log(m);}
const calcDays=ds=>{if(!ds)return null;return Math.floor((new Date()-new Date(ds))/86400000);};
function kClass(s){
  if(!s)return 'wait';
  if(s.includes('완료')||s.includes('대금지급'))return 'done';
  if(s.includes('처리중')||s.includes('접수')||s.includes('이관')||s.includes('관리소확인'))return 'wip';
  if(s.includes('반려')||s.includes('수용불가')||s.includes('종결'))return 'reject';
  return 'wait';
}
function stBadge(s){
  const c=kClass(s),cl={done:'sd',wip:'sw',wait:'sa',reject:'sr'}[c]||'sa';
  return `<span class="hst ${cl}">${s||'대기'}</span>`;
}
function parseDong(raw){
  if(!raw)return null;const s=String(raw).trim();
  const m1=s.match(/^(\d{3})(?:\.0+)?$/);if(m1)return parseInt(m1[1])+'동';
  const m2=s.match(/(\d{3})\s*동/);if(m2)return parseInt(m2[1])+'동';
  return null;
}
function getDK(fn){
  const m=(fn||'').match(/(\d{4})(\d{2})(\d{2})/);
  if(m)return m[1]+'-'+m[2]+'-'+m[3];
  return document.getElementById('kDate').value||toDay();
}
function fmtDate(s){
  if(!s||s==='nan'||s==='-')return '-';
  const str=String(s).replace(/[^0-9]/g,'');
  if(str.length===8)return str.slice(0,4)+'-'+str.slice(4,6)+'-'+str.slice(6,8);
  return s;
}

let fbUnsub=null;
function connectFB(){
  document.getElementById('iFB').textContent='연결 중...';
  if(fbUnsub){fbUnsub();fbUnsub=null;}
  function try_(n){
    if(window.fbSubscribe){
      fbUnsub=window.fbSubscribe(data=>{
        if(data&&Object.keys(data).length>0){
          const first=!appData;appData=data;
          document.getElementById('cFB').classList.add('firebase');
          document.getElementById('iFB').textContent='🔴 실시간 연동';
          updateChips();renderList();
          if(first){toast('☁️ Firebase 연동!');loadAcc();}
          else toast('🔄 공가앱 변경 반영');
        } else {document.getElementById('iFB').textContent='Firebase 연결';toast('⚠️ 데이터 없음');}
      });
    } else if(n<25){setTimeout(()=>try_(n+1),200);}
    else{document.getElementById('iFB').textContent='Firebase 연결';toast('❌ 연결 실패');}
  }
  try_(0);
}

function loadAcc(){
  function try_(n){
    if(window.fbLoadAccumulated){
      window.fbLoadAccumulated().then(res=>{
        if(res&&res.data&&Object.keys(res.data).length>0){
          kotisData=res.data;
          const total=Object.values(res.data).reduce((s,v)=>s+v.length,0);
          document.getElementById('iKotis').textContent=`📦 ${Object.keys(res.data).length}세대/${total}건`;
          document.getElementById('cKotis').classList.add('loaded');
          if(window.fbLoadChanges)window.fbLoadChanges().then(chg=>{
            chg.forEach(c=>changedKeys.add(c.key));
            updateChips();renderList();
          });else{updateChips();renderList();}
        }
      });
    } else if(n<25){setTimeout(()=>try_(n+1),200);}
  }
  try_(0);
}

function onFiles(e){
  const files=Array.from(e.target.files).sort((a,b)=>a.name.localeCompare(b.name));
  if(!files.length)return;e.target.value='';
  let totA=0,totC=0;
  const inf=document.getElementById('iKotis');
  inf.textContent='⏳ 처리 중...';
  function next(i){
    if(i>=files.length){
      inf.textContent=`✅ ${files.length}개·신규 ${totA}·변화 ${totC}건`;
      document.getElementById('cKotis').classList.add('loaded');
      toast(`완료! 신규 ${totA}건·변화 ${totC}건`);
      loadAcc();return;
    }
    const f=files[i];inf.textContent=`⏳ (${i+1}/${files.length}) ${f.name}`;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
        const items=parseRows(rows);
        const cnt=Object.keys(items).length,parsed=Object.values(items).reduce((s,v)=>s+v.length,0);
        if(!cnt){next(i+1);return;}
        const dk=getDK(f.name);
        function ts(n){
          if(window.fbSaveKotis&&window.fbMergeKotis){
            window.fbSaveKotis(dk,items,parsed,cnt).then(()=>window.fbMergeKotis(dk,items)).then(res=>{
              if(res){totA+=res.added;totC+=res.changed||0;}
              next(i+1);
            }).catch(()=>next(i+1));
          } else if(n<25){setTimeout(()=>ts(n+1),200);}
          else next(i+1);
        }
        ts(0);
      }catch(e){next(i+1);}
    };
    r.readAsArrayBuffer(f);
  }
  next(0);
}

function parseRows(rows){
  const items={};let hi=0;
  for(let i=0;i<Math.min(rows.length,10);i++){
    if(rows[i].some(v=>String(v||'').includes('접수일련번호'))){hi=i;break;}
  }
  const hdr=rows[hi].map(v=>String(v||'').trim());
  function fc(keys){
    let idx=hdr.findIndex(h=>keys.some(k=>h===k));
    if(idx>=0)return idx;
    return hdr.findIndex(h=>keys.some(k=>h.includes(k)));
  }
  const cDong=hdr.findIndex(h=>h==='동'),cDongA=fc(['단지 및 동주소','동주소']);
  const cHo=hdr.findIndex(h=>h==='호');
  const cSeq=fc(['접수일련번호','일련번호']);
  const cHjDate=fc(['하자접수일','접수일']);
  const cHjGu=fc(['하자구분']);
  const cBsuGu=fc(['보수구분']);
  const cStatus=fc(['하자진행상태','처리상태']);
  const cDaeGu=fc(['대분류']);
  const cCon=fc(['하자내용','내용']);
  const cProcess=fc(['처리내용']);
  const cPerson=fc(['민원인']);
  const cPhone=fc(['연락처']);
  const cMgr=fc(['LH담당자','담당자']);
  const cMgrPhone=fc(['LH담당자연락처']);
  const cBiz=fc(['업체명']);
  const cWorker=fc(['처리자']);
  const cWorkerPhone=fc(['처리자전화번호']);
  const cInstDate=fc(['보수지시일']);
  const cPlanDate=fc(['유지보수하자 보수예정일','보수예정일']);
  const cReportDate=fc(['완료보고일']);
  const cCompDate=fc(['보수완료일','완료일']);
  const cCallDate=fc(['콜센터독촉일']);
  const cElapsed=fc(['경과일']);
  const g=v=>String(v||'').trim();
  for(let i=hi+1;i<rows.length;i++){
    const row=rows[i];
    let dr=cDong>=0?g(row[cDong]):'';
    const hr=cHo>=0?g(row[cHo]):'';
    if(!hr)continue;
    let dong=parseDong(dr);
    if(!dong&&cDongA>=0)dong=parseDong(g(row[cDongA]));
    if(!dong||!BLDGS[dong])continue;
    const ho=parseInt(hr.replace(/[^0-9]/g,''));
    if(isNaN(ho)||ho<=0)continue;
    const seq=cSeq>=0?g(row[cSeq]):'';
    if(!seq)continue;
    const key=dong+'_'+ho;
    if(!items[key])items[key]=[];
    items[key].push({
      seqNo:seq,dong,ho,
      recDate:cHjDate>=0?g(row[cHjDate]):'',
      hajaGu:cHjGu>=0?g(row[cHjGu]):'',
      bsuGu:cBsuGu>=0?g(row[cBsuGu]):'',
      status:cStatus>=0?g(row[cStatus]):'',
      daeGu:cDaeGu>=0?g(row[cDaeGu]):'',
      content:cCon>=0?g(row[cCon]):'',
      processContent:cProcess>=0?g(row[cProcess]):'',
      person:cPerson>=0?g(row[cPerson]):'',
      phone:cPhone>=0?g(row[cPhone]):'',
      manager:cMgr>=0?g(row[cMgr]):'',
      mgrPhone:cMgrPhone>=0?g(row[cMgrPhone]):'',
      bizName:cBiz>=0?g(row[cBiz]):'',
      worker:cWorker>=0?g(row[cWorker]):'',
      workerPhone:cWorkerPhone>=0?g(row[cWorkerPhone]):'',
      instDate:cInstDate>=0?g(row[cInstDate]):'',
      planDate:cPlanDate>=0?g(row[cPlanDate]):'',
      reportDate:cReportDate>=0?g(row[cReportDate]):'',
      compDate:cCompDate>=0?g(row[cCompDate]):'',
      callDate:cCallDate>=0?g(row[cCallDate]):'',
      elapsed:cElapsed>=0?g(row[cElapsed]):'',
    });
  }
  return items;
}

function resetAcc(){
  if(!confirm('⚠️ 코티스 누적 이력 전부 삭제합니다.'))return;
  function try_(n){
    if(window.fbResetAccumulated){
      window.fbResetAccumulated().then(()=>{
        kotisData={};changedKeys.clear();
        document.getElementById('iKotis').textContent='코티스 업로드';
        document.getElementById('cKotis').classList.remove('loaded');
        toast('🗑️ 초기화 완료');updateChips();renderList();
      }).catch(e=>toast('❌ '+e.message));
    } else if(n<25){setTimeout(()=>try_(n+1),200);}
  }
  try_(0);
}

// ═══════════════════════════════════
// 목록 / 필터
// ═══════════════════════════════════
function getMeta(key){
  const items=kotisData[key]||[];
  const inp=items.filter(k=>{const c=kClass(k.status);return c==='wip'||c==='wait';});
  let maxD=null;
  inp.forEach(k=>{
    const rec=(k.recDate||'').replace(/[^0-9]/g,'').slice(0,8);
    if(rec.length===8){const d=calcDays(rec.slice(0,4)+'-'+rec.slice(4,6)+'-'+rec.slice(6,8));if(maxD===null||d>maxD)maxD=d;}
  });
  return {total:items.length,inprog:inp.length,maxDays:maxD};
}
function getVaka(key){
  if(!appData)return null;
  const [dong,ho]=key.split('_');
  const dd=appData[dong]||{};
  const e=Object.entries(dd).find(([uid])=>parseInt(uid)===parseInt(ho));
  if(!e)return null;
  return {status:e[1].status,reason:e[1].reason||'',outdate:e[1].outdate||''};
}
function buildList(){
  const keys=new Set([...Object.keys(kotisData)]);
  if(appData){Object.entries(appData).forEach(([dong,dd])=>{Object.entries(dd).forEach(([uid,u])=>{if(u.status==='공가'||u.status==='불가')keys.add(dong+'_'+parseInt(uid));});});}
  const list=[];
  keys.forEach(key=>{
    const m=getMeta(key);if(m.inprog===0&&curFilter!=='all')return;
    const v=getVaka(key);
    const isU=m.maxDays!=null&&m.maxDays>=7&&m.inprog>0;
    const isC=changedKeys.has(key);
    const isV=v&&(v.status==='공가'||v.status==='불가')&&m.inprog>0;
    if(curFilter==='urgent'&&!isU)return;
    if(curFilter==='changed'&&!isC)return;
    if(curFilter==='vaka'&&!isV)return;
    if(m.inprog===0&&curFilter==='all'&&!isV)return; // 전체에서도 미처리 없는 건 숨김
    list.push({key,m,v,isU,isC,isV});
  });
  list.sort((a,b)=>{
    const sa=(a.isU?4:0)+(a.isC?2:0)+(a.isV?1:0);
    const sb=(b.isU?4:0)+(b.isC?2:0)+(b.isV?1:0);
    return sb!==sa?sb-sa:(b.m.maxDays||0)-(a.m.maxDays||0);
  });
  return list;
}
function renderList(){
  const el=document.getElementById('listBody');
  const list=buildList();
  if(!list.length){el.innerHTML='<div style="padding:20px;text-align:center;font-size:12px;color:var(--t4)">해당 없음</div>';return;}
  el.innerHTML=list.map(({key,m,v,isU,isC,isV})=>{
    const [dong,ho]=key.split('_');
    const cls=(isU?'urg':isC?'chg':isV?'vak':'')+(key===curKey?' active':'');
    let tags='';
    if(isU)tags+=`<span class="tag tg-r">${m.maxDays}일</span>`;
    else if(m.maxDays>=3)tags+=`<span class="tag tg-y">${m.maxDays}일</span>`;
    if(isC)tags+=`<span class="tag tg-o">변화</span>`;
    if(v&&v.status==='불가')tags+=`<span class="tag tg-r">불가</span>`;
    else if(v&&v.status==='공가')tags+=`<span class="tag tg-g">공가</span>`;
    const top=(kotisData[key]||[]).find(k=>kClass(k.status)!=='done')?.content||(kotisData[key]||[])[0]?.content||'-';
    return `<div class="li ${cls}" onclick="selUnit('${key}')">
      <div class="li-r1"><span class="li-u">${dong} ${ho}호</span>${tags}</div>
      <div class="li-r2">미처리 ${m.inprog}건 · ${top.slice(0,16)}</div>
    </div>`;
  }).join('');
}
function updateChips(){
  const list=buildList();
  const u=list.filter(i=>i.isU).length,c=list.filter(i=>i.isC).length,v=list.filter(i=>i.isV).length,t=list.length;
  document.getElementById('chipRow').innerHTML=`
    <span class="chip ch-r" onclick="setF('urgent')">🔴 7일+ 긴급 ${u}세대</span>
    <span class="chip ch-o" onclick="setF('changed')">🟡 최근 변화 ${c}세대</span>
    <span class="chip ch-p" onclick="setF('vaka')">🔵 공가 미해결 ${v}세대</span>
    <span class="chip ch-b" onclick="setF('all')">전체 미처리 ${t}세대</span>`;
  document.getElementById('hdSub').textContent=`긴급 ${u} · 변화 ${c} · 공가미해결 ${v}`;
}
function setF(f){
  curFilter=f;
  ['all','urgent','changed','vaka'].forEach(id=>{
    const el=document.getElementById('ft-'+id);
    if(el)el.className='btn '+(id===f?'bp':'bg')+' ';
  });
  renderList();
}

          <div><span class="ig-label">대분류</span><br><span class="ig-val">${k.daeGu||'-'}</span></div>
          <div><span class="ig-label">진행상태</span><br>${stBadge(k.status)}</div>
        </div>
        ${k.processContent?`<div class="process-box"><b>처리내용:</b> ${k.processContent}</div>`:''}
        <div class="info-grid">
          <div><span class="ig-label">민원인</span><br><span class="ig-val">${k.person||'-'} ${k.phone?'<br><a href="tel:'+k.phone+'" style="color:var(--accent2);font-size:10px">📞 '+k.phone+'</a>':''}</span></div>
          <div><span class="ig-label">LH담당자</span><br><span class="ig-val">${k.manager||'-'} ${k.mgrPhone?'<br><a href="tel:'+k.mgrPhone+'" style="color:var(--accent2);font-size:10px">📞 '+k.mgrPhone+'</a>':''}</span></div>

          <div><span class="ig-label">처리자</span><br><span class="ig-val">${k.worker||'-'} ${k.workerPhone?'<br><a href="tel:'+k.workerPhone+'" style="color:var(--accent2);font-size:10px">📞 '+k.workerPhone+'</a>':''}</span></div>

        ${k.callDate&&k.callDate!=='-'?`<div style="font-size:11px;color:var(--orange);padding:4px 12px">⚠️ 콜센터 독촉일: ${fmtDate(k.callDate)}</div>`:''}
      </div>
    </div>`;
  }

  const inpHtml=inpItems.length?inpItems.map(renderHajaItem).join(''):'<div style="padding:12px;font-size:12px;color:var(--t4)">미처리 하자 없음</div>';
  const doneHtml=doneItems.length?doneItems.map(renderHajaItem).join(''):'';

  // 변화이력
  const chgHtml=changes.length?changes.map(c=>`
    <div class="chi">
      <div class="chd">${c.date}</div>
      <div class="chrow"><span class="chfr">${c.from}</span><span style="color:var(--t4)">→</span><span class="chto">${c.to}</span></div>
      <div class="chm">${c.seqNo?`<span class="mono">${c.seqNo}</span>`:''}${c.bizName?` · 업체: <b>${c.bizName}</b>`:''}${c.manager?` · 담당: <b>${c.manager}</b>`:''}</div>
    </div>`).join(''):'<div style="padding:12px;font-size:12px;color:var(--t4)">변화 이력 없음 (2회 이상 업로드 후 표시)</div>';

  // 메모
  const memoHtml=memos.length?memos.map(m=>m.type==='memo'?
    `<div class="mi"><div class="md">${m.date}</div><div class="mt">${m.text}</div><div class="ma">✍️ ${m.author||'관리자'}</div></div>`:

      <div class="uh-r2"><span>전체 <b>${items.length}건</b></span><span>미처리 <b style="color:${inpCount>0?'var(--red)':'var(--green)'}">${inpCount}건</b></span><span>완료 <b>${doneItems.length}건</b></span></div>

      <div class="sb">${inpHtml}</div>

    ${doneItems.length?`<div class="sec">
      <div class="sh" onclick="toggleSec(this)"><div class="st">✅ 완료/종결 (${doneItems.length}건)</div><span style="font-size:11px;color:var(--t4)">▶</span></div>
      <div class="sb" style="display:none">${doneHtml}</div>
    </div>`:''}

function toggleSec(el){
  const sb=el.nextElementSibling;
  const arrow=el.querySelector('span:last-child');
  const open=sb.style.display!=='none';
  sb.style.display=open?'none':'';
  if(arrow)arrow.textContent=open?'▶':'▼';
}
function toggleHi(el){
  const body=el.nextElementSibling;
  body.classList.toggle('open');
  const arrow=el.querySelector('.hi-right span:last-child');
  if(arrow)arrow.textContent=body.classList.contains('open')?'▲':'▼';
}

async function saveMemo(key){
  const text=document.getElementById('mta').value.trim();
  if(!text){toast('⚠️ 내용을 입력하세요');return;}
  if(!window.fbSaveMemo){toast('❌ Firebase 미준비');return;}
  const memos=await window.fbSaveMemo(key,{type:'memo',text,date:nowStr(),author:'관리자'});
  if(memos){
    document.getElementById('mta').value='';
    document.getElementById('memoArea').innerHTML=memos.map(m=>m.type==='memo'?
      `<div class="mi"><div class="md">${m.date}</div><div class="mt">${m.text}</div><div class="ma">✍️ ${m.author||'관리자'}</div></div>`:
      `<div class="ei"><div class="ed">${m.date}</div><div class="ec"><span class="ef">[수정]</span> ${m.text}</div></div>`
    ).join('');
    toast('💾 메모 저장됨');
  } else toast('❌ 저장 실패');
}

function onSearch(v){
  const res=document.getElementById('searchRes');
  if(!v.trim()){res.innerHTML='';return;}
  const q=v.toLowerCase();const results=[];
  Object.entries(kotisData).forEach(([key,items])=>{
    const [dong,ho]=key.split('_');
    items.forEach(k=>{if(k.seqNo&&k.seqNo.toLowerCase().includes(q)&&results.length<8)
      results.push({key,dong,ho,seqNo:k.seqNo,content:k.content});});
  });
  const dm=q.match(/(\d{3})\s*[-동]?\s*(\d{2,4})/);
  if(dm){const dong=dm[1]+'동',ho=parseInt(dm[2]);if(BLDGS[dong])results.unshift({key:dong+'_'+ho,dong,ho});}
  if(!results.length){res.innerHTML='<div style="padding:8px;font-size:12px;color:var(--t4)">결과 없음</div>';return;}
  res.innerHTML=`<div style="background:var(--surf);border:1.5px solid var(--border2);border-radius:8px;position:absolute;left:0;right:0;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.1);">`+
    results.map(r=>`<div onclick="selUnit('${r.key}');document.getElementById('searchInput').value='';document.getElementById('searchRes').innerHTML=''" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;" onmouseover="this.style.background='var(--bluebg)'" onmouseout="this.style.background=''">
      <div style="font-weight:800;color:var(--accent)">${r.dong} ${r.ho}호</div>
      ${r.seqNo?`<div class="mono" style="font-size:10px;color:var(--t4)">${r.seqNo}</div>`:''}
      ${r.content?`<div style="font-size:11px;color:var(--t3)">${r.content.slice(0,24)}</div>`:''}
    </div>`).join('')+'</div>';
}

            <span style="padding:2px 7px;border-radius:4px;background:var(--bluebg);color:var(--blue);font-size:11px;font-weight:700">${c.to}</span>
          </div>
          <div style="font-size:11px;color:var(--t3)">${c.seqNo?`<span class="mono">${c.seqNo}</span> · `:''}${c.content||''} ${c.bizName?'· 업체: '+c.bizName:''}</div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

// ═══════════════════════════════════
// 분석 탭
// ═══════════════════════════════════
function renderAna(){
  const el=document.getElementById('anaContent');
  const all=Object.values(kotisData).flat();
  if(!all.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--t4)">코티스 데이터가 없어요</div>';return;}
  const inp=all.filter(k=>{const c=kClass(k.status);return c==='wip'||c==='wait';});
  const done=all.filter(k=>kClass(k.status)==='done');
  const reject=all.filter(k=>kClass(k.status)==='reject');

  // 요약
  let html=`<div class="ana-grid">
    <div class="acard"><div class="ac-val" style="color:var(--accent)">${all.length}</div><div class="ac-label">전체 접수</div></div>
    <div class="acard"><div class="ac-val" style="color:var(--red)">${inp.length}</div><div class="ac-label">미처리</div></div>
    <div class="acard"><div class="ac-val" style="color:var(--green)">${done.length}</div><div class="ac-label">완료</div></div>
    <div class="acard"><div class="ac-val" style="color:var(--t3)">${reject.length}</div><div class="ac-label">반려/종결</div></div>
    <div class="acard"><div class="ac-val" style="color:var(--orange)">${Math.round(done.length/all.length*100)}%</div><div class="ac-label">처리율</div></div>
  </div>`;

  // 하자구분별
  const byHj={};all.forEach(k=>{const g=k.hajaGu||'기타';if(!byHj[g])byHj[g]={total:0,inp:0};byHj[g].total++;if(kClass(k.status)!=='done'&&kClass(k.status)!=='reject')byHj[g].inp++;});
  const maxHj=Math.max(...Object.values(byHj).map(v=>v.total),1);
  html+=`<div class="sec" style="margin-bottom:10px"><div class="sh"><div class="st">📊 하자구분별 현황</div></div><div class="sb"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>하자구분</th><th>전체</th><th>미처리</th><th>시각화</th></tr></thead><tbody>`;
  Object.entries(byHj).sort((a,b)=>b[1].total-a[1].total).forEach(([g,v])=>{
    html+=`<tr><td class="left">${g}</td><td style="font-weight:800">${v.total}</td><td style="color:${v.inp>0?'var(--red)':'var(--green)'};font-weight:800">${v.inp}</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v.total/maxHj*100)}%;background:var(--accent2)"></div></div></td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;

  // 보수구분별
  const byBs={};all.forEach(k=>{const g=k.bsuGu||'기타';if(!byBs[g])byBs[g]={total:0,inp:0};byBs[g].total++;if(kClass(k.status)!=='done'&&kClass(k.status)!=='reject')byBs[g].inp++;});
  const maxBs=Math.max(...Object.values(byBs).map(v=>v.total),1);
  html+=`<div class="sec" style="margin-bottom:10px"><div class="sh"><div class="st">🔧 보수구분별 현황</div></div><div class="sb"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>보수구분</th><th>전체</th><th>미처리</th><th>시각화</th></tr></thead><tbody>`;
  Object.entries(byBs).sort((a,b)=>b[1].total-a[1].total).forEach(([g,v])=>{
    html+=`<tr><td class="left">${g}</td><td style="font-weight:800">${v.total}</td><td style="font-weight:800;color:${v.inp>0?'var(--red)':'var(--green)'}">${v.inp}</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v.total/maxBs*100)}%;background:var(--orange)"></div></div></td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;

  // 동별 미처리
  const byDong={};
  inp.forEach(k=>{const d=(k.dong||'미상');if(!byDong[d])byDong[d]=0;byDong[d]++;});
  const maxD=Math.max(...Object.values(byDong),1);
  html+=`<div class="sec" style="margin-bottom:10px"><div class="sh"><div class="st">🏢 동별 미처리 현황</div></div><div class="sb"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>동</th><th>미처리</th><th>시각화</th></tr></thead><tbody>`;
  Object.entries(byDong).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>{
    html+=`<tr><td style="font-weight:800;color:var(--accent)">${d}</td><td style="font-weight:800;color:var(--red)">${n}건</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(n/maxD*100)}%;background:var(--red)"></div></div></td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;

  // 미처리 세대 Top10
  const unitRank=Object.entries(kotisData).map(([key,items])=>{
    const inpC=items.filter(k=>{const c=kClass(k.status);return c==='wip'||c==='wait';}).length;
    const [dong,ho]=key.split('_');
    return {key,dong,ho,inprog:inpC,total:items.length};
  }).filter(u=>u.inprog>0).sort((a,b)=>b.inprog-a.inprog).slice(0,10);
  html+=`<div class="sec"><div class="sh"><div class="st">🏠 미처리 많은 세대 Top10</div></div><div class="sb"><div class="tbl-wrap"><table class="tbl"><thead><tr><th>세대</th><th>미처리</th><th>전체</th></tr></thead><tbody>`;
  unitRank.forEach((u,i)=>{
    html+=`<tr style="cursor:pointer" onclick="showTab('list');selUnit('${u.key}')"><td class="mono" style="font-weight:800;color:var(--accent)">${u.dong} ${u.ho}호</td><td style="font-weight:800;color:var(--red)">${u.inprog}건</td><td style="color:var(--t3)">${u.total}건</td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;

  el.innerHTML=html;
}

// ═══════════════════════════════════
// 자재 관리
// ═══════════════════════════════════
let curMatNo=null;

async function initMat(){
  if(window.fbLoadMaterials){
    const fbMat=await window.fbLoadMaterials();
    if(fbMat&&fbMat.length){matList=fbMat;}
    else{
      // 초기 데이터 Firebase에 저장
      matList=INIT_MATERIALS.map(m=>({...m,log:[]}));
      if(window.fbSaveMaterials)await window.fbSaveMaterials(matList);
    }
  } else {
    matList=INIT_MATERIALS.map(m=>({...m,log:[]}));
  }
  showMatAll();
}

function showMatAll(){curMatFilter='all';renderMat();}
function showMatFilter(g){curMatFilter=g;renderMat();}

function filterMat(q){
  const list=getFilteredMat();
  const filtered=q?list.filter(m=>m.pumyeong.includes(q)||m.gyugyeok.includes(q)):list;
  renderMatCards(filtered);
}

function getFilteredMat(){
  if(!matList)return[];
  return curMatFilter==='all'?matList:matList.filter(m=>m.gongjong===curMatFilter);
}

function renderMat(){
  if(!matList){initMat();return;}
  renderMatCards(getFilteredMat());
}

function renderMatCards(list){
  const el=document.getElementById('matContent');
  const low=list.filter(m=>m.stock<=5&&m.stock>0).length;
  const zero=list.filter(m=>m.stock===0).length;
  let html=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:12px;">
    <span style="color:var(--t2)">총 ${list.length}품목</span>
    ${low?`<span style="color:var(--orange);font-weight:700">⚠️ 부족(5개↓) ${low}품목</span>`:''}
    ${zero?`<span style="color:var(--red);font-weight:700">🔴 재고 없음 ${zero}품목</span>`:''}
  </div>`;
  html+='<div class="mat-grid">';
  list.forEach(m=>{
    const low=m.stock<=5&&m.stock>0,zero=m.stock===0;
    html+=`<div class="mat-card ${zero?'zero':low?'low':''}">
      <span class="mc-tag">${m.bunryu}</span>
      <div class="mc-name">${m.pumyeong}</div>
      <div class="mc-spec">${m.gyugyeok||''} · ${m.gongjong}</div>
      <div class="mc-stock ${low||zero?'low':''}">${m.stock}<span class="mc-unit">개</span></div>
      <div class="mc-btns">
        <button class="btn bs" style="flex:1" onclick="openMatModal(${m.no},'in')">+ 입고</button>
        <button class="btn bd" style="flex:1" onclick="openMatModal(${m.no},'out')">- 출고</button>
        <button class="btn bg" style="flex:1" onclick="openMatLog(${m.no})">이력</button>
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function openMatModal(no, type){
  curMatNo=no;
  const m=matList.find(x=>x.no===no);if(!m)return;
  const isIn=type==='in';
  document.getElementById('matModalTitle').textContent=isIn?`📥 입고: ${m.pumyeong}`:`📤 출고: ${m.pumyeong}`;
  document.getElementById('matModalBody').innerHTML=`
    <div style="margin-bottom:10px;font-size:12px;color:var(--t2)">현재 재고: <b style="font-size:16px;color:var(--accent)">${m.stock}개</b></div>
    <label class="mlabel">수량</label>
    <input class="minput" type="number" id="matQty" min="1" value="1" placeholder="수량 입력">
    <label class="mlabel">사유 / 메모</label>
    <input class="minput" type="text" id="matReason" placeholder="${isIn?'입고 사유 (예: 정기발주)':'출고 사유 (예: 714동 1205호 교체)'}">
  `;
  document.getElementById('matModalOk').textContent=isIn?'입고 확인':'출고 확인';
  document.getElementById('matModalOk').onclick=()=>confirmMat(type);
  document.getElementById('matModal').classList.add('open');
}
function closeMatModal(){document.getElementById('matModal').classList.remove('open');}

async function confirmMat(type){
  const qty=parseInt(document.getElementById('matQty').value)||0;
  const reason=document.getElementById('matReason').value.trim();
  if(!qty||qty<=0){toast('⚠️ 수량을 입력하세요');return;}
  const m=matList.find(x=>x.no===curMatNo);if(!m)return;
  if(type==='out'&&m.stock<qty){toast('⚠️ 재고가 부족해요');return;}
  const before=m.stock;
  m.stock=type==='in'?m.stock+qty:m.stock-qty;
  if(!m.log)m.log=[];
  m.log.unshift({type:type==='in'?'입고':'출고',qty:type==='in'?qty:-qty,reason,date:nowStr(),before,after:m.stock});
  m.log=m.log.slice(0,50);
  if(window.fbSaveMaterials)await window.fbSaveMaterials(matList);
  closeMatModal();
  toast(`${type==='in'?'📥 입고':'📤 출고'} ${qty}개 완료 (잔여: ${m.stock}개)`);
  renderMat();
}

function openMatLog(no){
  const m=matList.find(x=>x.no===no);if(!m)return;
  const logs=m.log||[];
  document.getElementById('matModalTitle').textContent=`📋 이력: ${m.pumyeong}`;
  let html=`<div style="margin-bottom:8px;font-size:12px">현재 재고: <b style="color:var(--accent)">${m.stock}개</b></div>`;
  if(!logs.length){html+='<div style="font-size:12px;color:var(--t4)">이력 없음</div>';}
  else html+=logs.map(l=>`<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
    <div style="font-size:10px;color:var(--t4);font-family:monospace">${l.date}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
      <span style="padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;background:${l.type==='입고'?'var(--greenbg)':'var(--redbg)'};color:${l.type==='입고'?'var(--green)':'var(--red)'}">${l.type}</span>
      <span style="font-weight:800;color:${l.qty>0?'var(--green)':'var(--red)'}">${l.qty>0?'+'+l.qty:l.qty}개</span>
      <span style="color:var(--t3);font-size:11px">${l.before}→${l.after}개</span>
    </div>
    ${l.reason?`<div style="font-size:11px;color:var(--t3);margin-top:2px">${l.reason}</div>`:''}
  </div>`).join('');
  document.getElementById('matModalBody').innerHTML=html;
  document.getElementById('matModalOk').style.display='none';
  document.getElementById('matModal').classList.add('open');
}

async function showUnmatched(){
  const list=window.fbLoadUnmatched?await window.fbLoadUnmatched():[];
  const el=document.getElementById('matContent');
  if(!list.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--t4)">미매칭 항목이 없어요 👍</div>';return;}
  let html=`<div style="font-size:13px;font-weight:800;margin-bottom:10px;color:var(--orange)">⚠️ 자재 자동 매칭 실패 ${list.length}건 — 아래 항목을 확인하고 직접 출고 처리하세요</div>`;
  html+=list.map(u=>`<div style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px">
    <div style="font-weight:800;color:var(--accent)">${u.dong}동 ${u.ho}호</div>
    <div style="color:var(--t2);margin-top:2px">${u.content}</div>
    <div class="mono" style="font-size:10px;color:var(--t4)">${u.seqNo} · ${u.date}</div>
  </div>`).join('');
  el.innerHTML=html;
}

async function showMatLog(){
  const logs=window.fbLoadMaterialLog?await window.fbLoadMaterialLog():[];
  const el=document.getElementById('matContent');
  if(!logs.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--t4)">자재 이력이 없어요</div>';return;}
  let html=`<div style="font-size:13px;font-weight:800;margin-bottom:10px">📋 자재 이력 (최근 100건)</div>`;
  html+=logs.slice(0,100).map(l=>`<div style="padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px">
    <div style="font-size:10px;color:var(--t4);font-family:monospace">${l.date}</div>
    <div style="margin-top:2px">${l.content||''}</div>
  </div>`).join('');
  el.innerHTML=html;
}

// ═══════════════════════════════════
// 탭 전환
// ═══════════════════════════════════
function showTab(t){
  curTab=t;
  ['list','change','ana','mat'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('on',id===t);
    document.getElementById('tab-'+id+'-content').style.display=id===t?'':'none';
  });
  if(t==='change')renderChanges();
  else if(t==='ana')renderAna();
  else if(t==='mat'){if(!matList)initMat();else renderMat();}
}

// ═══════════════════════════════════
// 초기화
// ═══════════════════════════════════
document.getElementById('kDate').value=toDay();
document.addEventListener('fbReady',()=>{loadAcc();initMat();});
if(window._fbReady){loadAcc();initMat();}
</script>
