<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>LH 공가점검 - 백업기능 포함</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    /* 기존 스타일 유지 및 백업 섹션 디자인 추가 */
    body { font-family: sans-serif; background: #f0f4f8; padding: 10px; max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
    .btn-blue { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
    .btn-gray { background: #64748b; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; }
    .file-input { margin-top: 10px; font-size: 12px; }
    .info-text { font-size: 11px; color: #666; margin-top: 5px; line-height: 1.4; }
</style>
</head>
<body>

    <div class="card">
        <h2>🏠 LH 공가점검 관리</h2>
        <p>현재 등록된 세대 데이터를 관리합니다.</p>
    </div>

    <div class="card" style="border: 2px solid #3b82f6;">
        <h3 style="font-size: 15px; color: #1e3a8a;">💾 데이터 동기화 (모바일 ↔ PC)</h3>
        
        <div style="margin-top:10px;">
            <p class="info-text"><strong>모바일에서:</strong> 점검 후 아래 버튼을 눌러 파일을 저장한 뒤, 카톡/메일로 PC에 보내세요.</p>
            <button onclick="exportBackup()" class="btn-blue">1. 내보내기 (JSON 파일 저장)</button>
        </div>

        <div style="margin-top:20px; border-top: 1px dashed #ccc; padding-top: 15px;">
            <p class="info-text"><strong>PC에서:</strong> 전달받은 파일을 선택하면 모바일의 작업 내용이 그대로 불러와집니다.</p>
            <input type="file" id="importFile" accept=".json" onchange="importBackup(event)" class="file-input">
            <label for="importFile" class="btn-gray" style="display:block; text-align:center;">2. 백업 파일 불러오기</label>
        </div>
    </div>

<script>
    // 기존 데이터 변수 (이미 코드에 있는 부분)
    let units = JSON.parse(localStorage.getItem('lh_units_data')) || {};

    // [추가 기능 1] 데이터 내보내기 (JSON 생성 및 다운로드)
    function exportBackup() {
        if (Object.keys(units).length === 0) {
            alert("저장된 데이터가 없습니다.");
            return;
        }

        const dataStr = JSON.stringify(units, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const now = new Date();
        const dateStr = `${now.getMonth()+1}월${now.getDate()}일_${now.getHours()}시${now.getMinutes()}분`;
        const fileName = `LH_공가백업_${dateStr}.json`;

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        alert("백업 파일이 기기에 저장되었습니다.\n이 파일을 PC로 전달하세요.");
    }

    // [추가 기능 2] 데이터 불러오기 (JSON 읽기 및 복원)
    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                
                if (confirm("기존 앱의 데이터를 지우고, 선택한 파일의 데이터로 교체하시겠습니까?")) {
                    units = importedData;
                    // 브라우저 저장소에 기록
                    localStorage.setItem('lh_units_data', JSON.stringify(units));
                    
                    // 화면 업데이트 함수 호출 (기존 코드에 정의된 함수명 확인 필요)
                    if (typeof renderUnits === 'function') {
                        renderUnits();
                    } else {
                        location.reload(); // 함수명을 모를 경우 페이지 새로고침
                    }
                    alert("데이터 복원이 완료되었습니다!");
                }
            } catch (err) {
                alert("파일 읽기 오류: 올바른 백업 파일(.json)이 아닙니다.");
            }
        };
        reader.readAsText(file);
    }

    // 기존의 나머지 함수들 (savePDF, exportExcel 등)은 그대로 유지하세요.
</script>

</body>
</html>
