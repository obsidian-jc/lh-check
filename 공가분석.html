<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>율정7단지 공가 분석</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, orderBy, onSnapshot }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBjnICflVU6VTAfcTxbCaKEb2DbZLuHddM",
  authDomain:"yuljeong7-3e56b.firebaseapp.com",
  projectId:"yuljeong7-3e56b",
  storageBucket:"yuljeong7-3e56b.firebasestorage.app",
  messagingSenderId:"245660321597",
  appId:"1:245660321597:web:04a21998831221b9ade754"
});
const db = getFirestore(app);

// 공가앱 실시간 구독
window.fbSubscribe = cb => onSnapshot(doc(db,'aptData','main'), s => {
  if(s.exists()) try{ cb(JSON.parse(s.data().db||'{}')); }catch(e){}
}, e => console.warn(e));

// 코티스 날짜별 저장
window.fbSaveKotis = async (dk, data, parsed, cnt) => {
  try{
    await setDoc(doc(db,'kotisHistory',dk),{
      data:JSON.stringify(data), savedAt:new Date().toISOString(),
      dateKey:dk, parsed, unitCnt:cnt
    });
    return true;
  }catch(e){ fbErr('fbSaveKotis',e); return false; }
};

// 누적 머지 저장 — 동별 분리 저장 (각 문서 ~90KB, 1MB 한도 회피)
window.fbMergeKotis = async (dk, newData) => {
  try{
    // newData를 동별로 분리
    const byDong = {};
    Object.entries(newData).forEach(([key, items]) => {
      const dong = key.split('_')[0]; // "714동_1205" → "714동"
      if(!byDong[dong]) byDong[dong] = {};
      if(!byDong[dong][key]) byDong[dong][key] = {};
      items.forEach(item => {
        if(!item.seqNo) return;
        byDong[dong][key][item.seqNo] = item;
      });
    });

    let added=0, updated=0;
    const dongs = Object.keys(byDong);

    // 동별로 기존 문서 읽어서 머지 후 저장
    for(const dong of dongs){
      const docRef = doc(db,'kotisAccumulated',dong);
      const snap = await getDoc(docRef);
      let acc = {};
      if(snap.exists()) try{ acc = JSON.parse(snap.data().data||'{}'); }catch(e){}

      Object.entries(byDong[dong]).forEach(([key, seqMap]) => {
        if(!acc[key]) acc[key] = {};
        Object.values(seqMap).forEach(item => {
          const ex = acc[key][item.seqNo];
          if(!ex){ acc[key][item.seqNo]={...item,firstSeen:dk,lastSeen:dk,lastStatus:item.status}; added++; }
          else { acc[key][item.seqNo]={...ex,...item,firstSeen:ex.firstSeen,lastSeen:dk,lastStatus:item.status}; updated++; }
        });
      });

      const jsonStr = JSON.stringify(acc);
      const sizeKB = Math.round(jsonStr.length/1024);
      if(window.LOG) LOG(`[저장] ${dong}: ${sizeKB}KB`);
      await setDoc(docRef, {data:jsonStr, updatedAt:new Date().toISOString(), lastDateKey:dk});
    }

    // 메타 문서(마지막 날짜) 업데이트
    await setDoc(doc(db,'kotisAccumulated','_meta'),{lastDateKey:dk, updatedAt:new Date().toISOString()});
    if(window.LOG) LOG(`[머지완료] 신규:${added} 업데이트:${updated}`);
    return {added, updated};
  }catch(e){ fbErr('fbMergeKotis',e); return null; }
};

// 누적 불러오기 — 동별 문서 14개 읽기
window.fbLoadAccumulated = async () => {
  try{
    const DONG_LIST = ['701동','702동','703동','704동','705동','706동','707동','708동','709동','710동','711동','712동','713동','714동'];
    const result = {};
    let lastDateKey = '-';

    // 메타 문서에서 마지막 날짜 읽기
    try{
      const meta = await getDoc(doc(db,'kotisAccumulated','_meta'));
      if(meta.exists()) lastDateKey = meta.data().lastDateKey || '-';
    }catch(e){}

    // 동별 문서 병렬 로드
    const snaps = await Promise.all(DONG_LIST.map(d => getDoc(doc(db,'kotisAccumulated',d))));
    snaps.forEach(snap => {
      if(!snap.exists()) return;
      try{
        const raw = JSON.parse(snap.data().data||'{}');
        Object.keys(raw).forEach(k => { result[k] = Object.values(raw[k]); });
      }catch(e){}
    });

    if(!Object.keys(result).length) return null;
    return {data:result, lastDateKey};
  }catch(e){ fbErr('fbLoadAccumulated',e); return null; }
};

// 날짜 목록
window.fbLoadDates = async () => {
  try{
    const snap = await getDocs(query(collection(db,'kotisHistory'),orderBy('dateKey','desc')));
    return snap.docs.map(d=>({dateKey:d.data().dateKey,savedAt:d.data().savedAt,parsed:d.data().parsed,unitCnt:d.data().unitCnt}));
  }catch(e){ fbErr('fbLoadDates',e); return []; }
};

// 특정 날짜 불러오기
window.fbLoadByDate = async dk => {
  try{
    const snap = await getDoc(doc(db,'kotisHistory',dk));
    if(snap.exists()) return JSON.parse(snap.data().data||'{}');
  }catch(e){ fbErr('fbLoadByDate',e); }
  return null;
};

// 누적 초기화 — 동별 문서 14개 + 메타 삭제
window.fbResetAccumulated = async () => {
  const DONG_LIST = ['701동','702동','703동','704동','705동','706동','707동','708동','709동','710동','711동','712동','713동','714동','_meta'];
  await Promise.all(DONG_LIST.map(d => deleteDoc(doc(db,'kotisAccumulated',d)).catch(()=>{})));
};

function fbErr(fn, e){ console.warn('[FB]',fn,e); if(window.LOG) LOG('🔴 FB오류 '+fn+' | code:'+e.code+' | '+e.message+' | '+String(e)); }

window._fbReady = true;
document.dispatchEvent(new Event('fbReady'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f4fb; --surf:#fff; --surf2:#f5f7fc; --border:#dde2f0; --accent:#2563eb;
  --green:#16a34a; --red:#dc2626; --orange:#ea580c; --yellow:#d97706; --purple:#7c3aed;
  --text1:#0f172a; --text2:#475569; --text3:#94a3b8;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;}
.wrap{max-width:960px;margin:0 auto;padding:12px;}

/* ── 헤더 */
.hd{background:var(--accent);color:#fff;padding:14px 18px;border-radius:14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.hd-title{font-size:18px;font-weight:900;flex:1;}
.hd-sub{font-size:12px;opacity:.8;margin-top:2px;}

/* ── 업로드 영역 */
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:600px){.upload-grid{grid-template-columns:1fr;}}
.ucard{background:var(--surf);border:2px solid var(--border);border-radius:12px;padding:14px;transition:border-color .2s;}
.ucard.loaded{border-color:#86efac;background:#f0fdf4;}
.ucard.firebase{border-color:#93c5fd;background:#eff6ff;}
.ucard-icon{font-size:24px;margin-bottom:6px;}
.ucard-title{font-size:13px;font-weight:800;color:var(--text1);margin-bottom:2px;}
.ucard-sub{font-size:11px;color:var(--text3);margin-bottom:8px;}
.ucard-info{font-size:11px;color:var(--green);font-weight:700;min-height:16px;margin-bottom:6px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 10px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surf2);border:1.5px solid var(--border);color:var(--text2);}
.btn-danger{background:#fff0f0;border:1.5px solid #fca5a5;color:var(--red);}
.btn-fb{background:#1d4ed8;color:#fff;width:100%;}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;}

/* ── 로그 박스 */
.logbox{display:none;background:#0f172a;color:#86efac;border-radius:10px;padding:10px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;line-height:1.8;max-height:160px;overflow-y:auto;margin-bottom:10px;}

/* ── 탭 */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;background:var(--surf);border-radius:12px;padding:6px;}
.tab{padding:7px 12px;border:none;background:none;font-size:12px;font-weight:700;color:var(--text2);border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab.on{background:var(--accent);color:#fff;}

/* ── 카드/섹션 */
.section{background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.section-title{font-size:13px;font-weight:900;color:var(--text1);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.no-data{text-align:center;padding:48px 20px;color:var(--text3);}
.no-data .icon{font-size:36px;margin-bottom:8px;}
.no-data p{font-size:13px;line-height:1.8;}

/* ── 요약 카드 그리드 */
.scard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:12px;}
.scard{background:var(--surf2);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center;}
.scard-val{font-size:22px;font-weight:900;line-height:1.1;}
.scard-label{font-size:10px;color:var(--text2);font-weight:600;margin-top:3px;}
.scard-sub{font-size:10px;color:var(--text3);margin-top:1px;}

/* ── 테이블 */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--surf2);border-bottom:2px solid var(--border);padding:7px 8px;font-weight:700;text-align:center;white-space:nowrap;}
.tbl td{border-bottom:1px solid var(--border);padding:6px 8px;text-align:center;vertical-align:middle;}
.tbl tr:hover td{background:#f8faff;}
.tbl .left{text-align:left;}
.tbl .mono{font-family:'JetBrains Mono',monospace;font-size:11px;}
.tbl-wrap{overflow-x:auto;}

/* ── 바 */
.bar-bg{background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;}

/* ── 배지 */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-ga{background:#fef9c3;color:#854d0e;}
.badge-bul{background:#fee2e2;color:#991b1b;}
.badge-done{background:#dcfce7;color:#166534;}
.badge-wip{background:#fef3c7;color:#92400e;}
.badge-wait{background:#dbeafe;color:#1e40af;}
.badge-reject{background:#f1f5f9;color:#475569;}
.badge-d180{background:#fee2e2;color:#991b1b;}
.badge-d90{background:#ffedd5;color:#9a3412;}
.badge-d30{background:#fef9c3;color:#854d0e;}

/* ── 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surf);border-radius:16px;width:100%;max-width:480px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.modal-head{padding:14px 18px;border-bottom:1.5px solid var(--border);background:var(--surf2);display:flex;align-items:center;justify-content:space-between;}
.modal-head-title{font-size:15px;font-weight:900;color:var(--accent);}
.modal-body{overflow-y:auto;flex:1;padding:12px;}

/* ── 날짜 입력 */
input[type=date]{padding:5px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;background:var(--surf);color:var(--text1);cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">

<!-- 헤더 -->
<div class="hd">
  <div>
    <div class="hd-title">🏘️ 율정7단지 공가 분석</div>
    <div class="hd-sub" id="hdSub">데이터를 불러오세요</div>
  </div>
</div>

<!-- 업로드 -->
<div class="upload-grid">
  <!-- 공가앱 Firebase -->
  <div class="ucard" id="cardFB">
    <div class="ucard-icon">🔥</div>
    <div class="ucard-title">공가앱 연동</div>
    <div class="ucard-sub">Firebase 실시간 연동</div>
    <div class="ucard-info" id="infoFB"></div>
    <button class="btn btn-fb" onclick="connectFB()">🔗 Firebase 연결</button>

  <!-- 코티스 -->
  <div class="ucard" id="cardKotis">
    <input type="file" id="fileKotis" accept=".xls,.xlsx" style="display:none" multiple onchange="onKotisFiles(event)">

    <div class="ucard-title">코티스 엑셀</div>
    <div class="ucard-sub">날짜별 누적 · 여러 파일 가능</div>
    <div class="ucard-info" id="infoKotis"></div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <span style="font-size:11px;font-weight:700;color:var(--text2)">📅 기준일</span>

      <button class="btn btn-primary" style="flex:2" onclick="document.getElementById('fileKotis').click()">📂 엑셀 업로드</button>

<!-- 로그 박스 -->
<div class="logbox" id="logBox"></div>

<!-- 탭 -->
<div class="tabs">
  <button class="tab on" id="tab-summary" onclick="showTab('summary')">📋 종합요약</button>
  <button class="tab" id="tab-dong" onclick="showTab('dong')">🏢 동별현황</button>
  <button class="tab" id="tab-kotis" onclick="showTab('kotis')">📡 하자분석</button>
  <button class="tab" id="tab-long" onclick="showTab('long')">🚨 장기미처리</button>
  <button class="tab" id="tab-trend" onclick="showTab('trend')">📈 추이분석</button>
  <button class="tab" id="tab-link" onclick="showTab('link')">🔗 공가+하자</button>
</div>

<!-- 탭 콘텐츠 -->
<div id="tab-summary-content"></div>
<div id="tab-dong-content" style="display:none"></div>
<div id="tab-kotis-content" style="display:none"></div>
<div id="tab-long-content" style="display:none"></div>
<div id="tab-trend-content" style="display:none"></div>
<div id="tab-link-content" style="display:none"></div>

</div><!-- /wrap -->

<!-- 이력 모달 -->
<div class="modal-bg" id="historyModal" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-title">📅 코티스 업로드 이력</div>
      <button class="btn btn-ghost" onclick="closeHistory()">✕</button>
    </div>
    <div class="ucard-sub" style="padding:8px 16px;background:#fffbeb;border-bottom:1px solid var(--border);font-size:11px;">날짜를 선택하면 해당 날의 데이터를 불러와요</div>
    <div class="modal-body" id="historyList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════
// 단지 정보
// ═══════════════════════════════════════
const BLDGS = {
  "701동":{total:52,floors:13,upf:4},
  "702동":{total:140,floors:20,upf:7},
  "703동":{total:140,floors:20,upf:7},
  "704동":{total:90,floors:15,upf:6},
  "705동":{total:66,floors:11,upf:6},
  "706동":{total:44,floors:11,upf:4},
  "707동":{total:80,floors:14,upf:6},
  "708동":{total:112,floors:13,upf:10},
  "709동":{total:92,floors:13,upf:8},
  "710동":{total:140,floors:20,upf:7},
  "711동":{total:60,floors:15,upf:4},
  "712동":{total:48,floors:12,upf:4},
  "713동":{total:52,floors:13,upf:4},
  "714동":{total:140,floors:20,upf:7},
};
const DONG_LIST = Object.keys(BLDGS).sort();
const TOTAL_UNITS = Object.values(BLDGS).reduce((s,b)=>s+b.total,0);

// ═══════════════════════════════════════
// 상태
// ═══════════════════════════════════════
let appData = null;
let kotisData = {};   // {key: [items]}
let curTab = 'summary';
let fbUnsub = null;

// ═══════════════════════════════════════
// 유틸
// ═══════════════════════════════════════
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function LOG(msg){
  const box=document.getElementById('logBox');
  box.style.display='block';
  const t=new Date().toLocaleTimeString('ko-KR',{hour12:false});
  box.textContent+=t+' '+msg+'\n';
  box.scrollTop=box.scrollHeight;
}
function calcDays(ds){ if(!ds)return null; return Math.floor((new Date()-new Date(ds))/86400000); }
function kotisClass(s){
  if(!s) return 'wait';
  if(s.includes('완료')||s.includes('대금지급')) return 'done';
  if(s.includes('처리중')||s.includes('접수')||s.includes('이관')||s.includes('관리소확인')) return 'wip';
  if(s.includes('반려')||s.includes('수용불가')||s.includes('종결')) return 'reject';
  return 'wait';
}
function daysBadge(days){
  if(days==null) return '-';
  if(days>=180) return `<span class="badge badge-d180">${days}일 🔴</span>`;
  if(days>=90)  return `<span class="badge badge-d90">${days}일 🟠</span>`;
  if(days>=30)  return `<span class="badge badge-d30">${days}일 🟡</span>`;
  return days+'일';
}
function noData(msg){
  return `<div class="no-data"><div class="icon">📭</div><p>${msg||'데이터를 불러오세요'}</p></div>`;
}
function scard(val, label, color, sub){
  return `<div class="scard"><div class="scard-val" style="color:${color}">${val}</div><div class="scard-label">${label}</div>${sub?`<div class="scard-sub">${sub}</div>`:''}</div>`;
}

// 동번호 파싱: '714', '714.0', '714동', '양주옥정7 714동' 모두 처리
function parseDong(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  const m1 = s.match(/^(\d{3})(?:\.0+)?$/);
  if(m1) return parseInt(m1[1])+'동';
  const m2 = s.match(/(\d{3})\s*동/);
  if(m2) return parseInt(m2[1])+'동';
  return null;
}

// ═══════════════════════════════════════
// Firebase 연결
// ═══════════════════════════════════════
function connectFB(){
  const btn = document.querySelector('#cardFB .btn-fb');
  btn.textContent='연결 중...'; btn.disabled=true;
  if(fbUnsub){ fbUnsub(); fbUnsub=null; }
  function tryConn(n){
    if(window.fbSubscribe){
      fbUnsub = window.fbSubscribe(data => {
        if(data && Object.keys(data).length>0){
          const isFirst = !appData;
          appData = data;
          document.getElementById('cardFB').classList.add('loaded');
          document.getElementById('infoFB').textContent = '🔴 실시간 연동 중';
          btn.textContent='🔴 실시간 연동 중'; btn.disabled=false;
          updateHeader();
          renderTab(curTab);
          if(isFirst){ toast('☁️ Firebase 연동!'); loadAccumulated(); }
          else toast('🔄 공가앱 변경 반영');
        } else {
          toast('⚠️ Firebase 데이터 없음');
          btn.textContent='🔗 Firebase 연결'; btn.disabled=false;
        }
      });

// ═══════════════════════════════════════
// 코티스 엑셀 업로드
// ═══════════════════════════════════════
function onKotisFiles(e){
  const files = Array.from(e.target.files);
  if(!files.length) return;
  e.target.value='';
  const sorted = [...files].sort((a,b)=>a.name.localeCompare(b.name));
  const info = document.getElementById('infoKotis');
  info.textContent='⏳ 처리 중...';
  let done=0, totalAdded=0, totalUpdated=0;
  function next(i){
    if(i>=sorted.length){
      info.textContent=`✅ ${sorted.length}개 완료 · 신규 ${totalAdded}건 · 업데이트 ${totalUpdated}건`;
      document.getElementById('cardKotis').classList.add('loaded');
      toast(`🎉 완료! 신규 ${totalAdded}건`);
      loadAccumulated();
      return;
    }
    const file = sorted[i];
    info.textContent=`⏳ (${i+1}/${sorted.length}) ${file.name}`;
    const r = new FileReader();
    r.onload = ev => {
      try{
        const wb = XLSX.read(ev.target.result,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const items = parseKotisRows(rows);
        const cnt = Object.keys(items).length;
        const parsed = Object.values(items).reduce((s,v)=>s+v.length,0);
        LOG(`[파싱] ${file.name} → ${cnt}세대/${parsed}건`);
        if(cnt===0){ LOG('[경고] 파싱 결과 0 — 파일 확인 필요'); next(i+1); return; }
        const dk = getDateKey(file.name);
        function trySave(n){
          if(window.fbSaveKotis && window.fbMergeKotis){
            window.fbSaveKotis(dk,items,parsed,cnt).then(()=>{
              return window.fbMergeKotis(dk,items);
            }).then(res=>{
              if(res){ totalAdded+=res.added; totalUpdated+=res.updated; LOG(`[저장] 신규 ${res.added}건 업데이트 ${res.updated}건`); }
              else LOG('[경고] Firebase 저장 실패');
              next(i+1);
            }).catch(e=>{ LOG('[오류] '+e.message); next(i+1); });
          } else if(n<25){ setTimeout(()=>trySave(n+1),200); }
          else { LOG('[경고] Firebase 미준비'); next(i+1); }
        }
        trySave(0);
      }catch(e){ LOG('[오류] '+file.name+': '+e.message); next(i+1); }
    };
    r.readAsArrayBuffer(file);
  }
  next(0);
}

function getDateKey(filename){
  const m = (filename||'').match(/(\d{4})(\d{2})(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return document.getElementById('kotisDate').value || todayStr();
}

// ═══════════════════════════════════════
// 코티스 파싱
// ═══════════════════════════════════════
function parseKotisRows(rows){
  const items={};
  // 헤더 행 찾기
  let hdrIdx=0;
  for(let i=0;i<Math.min(rows.length,10);i++){
    if(rows[i].some(v=>String(v||'').includes('접수일련번호'))){hdrIdx=i;break;}
    if(rows[i].some(v=>String(v||'').includes('동'))){hdrIdx=i;}
  }
  const hdr = rows[hdrIdx].map(v=>String(v||'').trim());

  // 정확 일치 우선, 없으면 포함
  function findCol(keys){
    let idx = hdr.findIndex(h=>keys.some(k=>h===k));
    if(idx>=0) return idx;
    return hdr.findIndex(h=>keys.some(k=>h.includes(k)));
  }
  const ciDong    = hdr.findIndex(h=>h==='동');  // 정확히 '동'
  const ciDongAlt = findCol(['단지 및 동주소','동주소']);
  const ciHo      = hdr.findIndex(h=>h==='호');
  const ciSeq     = findCol(['접수일련번호','일련번호','접수번호']);
  const ciDate    = findCol(['하자접수일','접수일','접수일자']);
  const ciStatus  = findCol(['하자진행상태','처리상태','진행상태']);
  const ciContent = findCol(['하자내용','내용']);
  const ciMgr     = findCol(['LH담당자','담당자']);
  const ciComp    = findCol(['보수완료일','완료일']);

  for(let i=hdrIdx+1;i<rows.length;i++){
    const row = rows[i];
    let dongRaw = ciDong>=0 ? String(row[ciDong]||'').trim() : '';
    const hoRaw = ciHo>=0  ? String(row[ciHo]||'').trim()   : '';
    if(!hoRaw) continue;
    let dong = parseDong(dongRaw);
    if(!dong && ciDongAlt>=0) dong = parseDong(String(row[ciDongAlt]||'').trim());
    if(!dong || !BLDGS[dong]) continue;
    const ho = parseInt(hoRaw.replace(/[^0-9]/g,''));
    if(isNaN(ho)||ho<=0) continue;
    const seqNo = ciSeq>=0 ? String(row[ciSeq]||'').trim() : '';
    if(!seqNo) continue;
    const key = dong+'_'+ho;
    if(!items[key]) items[key]=[];
    items[key].push({
      seqNo,
      dong,ho,
      recDate: ciDate>=0 ? String(row[ciDate]||'').trim() : '',
      status:  ciStatus>=0 ? String(row[ciStatus]||'').trim() : '',
      content: ciContent>=0 ? String(row[ciContent]||'').trim() : '',
      manager: ciMgr>=0 ? String(row[ciMgr]||'').trim() : '',
      compDate:ciComp>=0 ? String(row[ciComp]||'').trim() : '',
    });
  }
  return items;
}

function collectUnits(){
  const units=[];
  if(!appData) return units;
  Object.entries(appData).forEach(([dong,dd])=>{
    Object.entries(dd).forEach(([uid,u])=>{
      units.push({dong,uid,status:u.status,reason:u.reason||'',staff:u.staff||'',
        outdate:u.outdate||'',days:u.outdate?calcDays(u.outdate):null});
    });
  });

}

      ${scard(ga+bul,'전체 공가','#1d4ed8','')}

      ${scard(bul,'공급불가','#dc2626','')}

      ${scard(TOTAL_UNITS,'전체 세대','#475569','')}

  }

  // 하자 요약

      ${scard(kotisAll.length,'전체 하자','#1d4ed8','')}

      ${scard(inprog,'미처리합계','#ea580c','건')}

  el.innerHTML=html;

function renderKotis(){
  const el=document.getElementById('tab-kotis-content');

  kotisAll.forEach(k=>stages[kotisClass(k.status)].push(k));
  const inprog=[...stages.wip,...stages.wait];

  let html=`<div class="scard-grid">
    ${scard(kotisAll.length,'전체 하자','#1d4ed8','')}
    ${scard(stages.done.length,'처리완료','#16a34a',Math.round(stages.done.length/kotisAll.length*100)+'%')}
    ${scard(stages.wip.length,'처리중','#d97706','건')}
    ${scard(stages.wait.length,'대기중','#2563eb','건')}
    ${scard(stages.reject.length,'반려/종결','#94a3b8','건')}
    ${scard(inprog.length,'미처리합계','#ea580c','건')}
  </div>`;

  // 단계별
  html+=`<div class="section"><div class="section-title">📊 처리 단계별 현황</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>단계</th><th>건수</th><th>비율</th><th>시각화</th></tr></thead><tbody>`;
  [{l:'✅ 처리완료',k:'done',c:'#16a34a'},{l:'🔧 처리중',k:'wip',c:'#d97706'},{l:'⏳ 대기',k:'wait',c:'#2563eb'},{l:'❌ 반려/종결',k:'reject',c:'#94a3b8'}].forEach(s=>{
    const cnt=stages[s.k].length, pct=kotisAll.length?Math.round(cnt/kotisAll.length*100):0;

  });

  html+=`<div class="section"><div class="section-title">🏢 동별 미처리</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>동</th><th>미처리</th><th>시각화</th></tr></thead><tbody>`;
  Object.entries(byDong).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>{
    html+=`<tr><td class="mono" style="font-weight:800;color:var(--accent)">${d}</td><td style="font-weight:800;color:#ea580c">${n}건</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(n/maxD*100)}%;background:#ea580c"></div></div></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;

  // 유형 Top10
  const typeMap={};
  inprog.forEach(k=>{ const c=(k.content||'기타').slice(0,20).trim(); if(!typeMap[c])typeMap[c]=0; typeMap[c]++; });
  const typeRank=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(typeRank.length){
    const maxT=typeRank[0][1];
    html+=`<div class="section"><div class="section-title">🔧 하자 유형 Top10 (미처리)</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>순위</th><th>내용</th><th>건수</th><th>시각화</th></tr></thead><tbody>`;
    typeRank.forEach(([c,n],i)=>{
      html+=`<tr><td style="font-weight:800">${i+1}</td><td class="left">${c}</td><td style="font-weight:800;color:#7c3aed">${n}건</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(n/maxT*100)}%;background:#7c3aed"></div></div></td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  // 담당자별
  const mgrMap={};
  inprog.forEach(k=>{ const m=k.manager||'미지정'; if(!mgrMap[m])mgrMap[m]=0; mgrMap[m]++; });
  const mgrRank=Object.entries(mgrMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(mgrRank.length){
    const maxM=mgrRank[0][1];
    html+=`<div class="section"><div class="section-title">👤 담당자별 미처리</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>담당자</th><th>미처리</th><th>비율</th><th>시각화</th></tr></thead><tbody>`;
    mgrRank.forEach(([m,n])=>{
      const pct=inprog.length?Math.round(n/inprog.length*100):0;
      html+=`<tr><td class="left">${m}</td><td style="font-weight:800">${n}건</td><td>${pct}%</td><td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(n/maxM*100)}%;background:#059669"></div></div></td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  el.innerHTML=html;
}

  // 공가 장기
  if(appData){
    const vakas=collectUnits().filter(u=>(u.status==='공가'||u.status==='불가')&&u.days!=null).sort((a,b)=>b.days-a.days);
    html+=`<div class="section"><div class="section-title">⏰ 장기 공가 세대</div>
    <div class="scard-grid">
      ${scard(vakas.filter(u=>u.days>=180).length,'180일+','#dc2626','')}
      ${scard(vakas.filter(u=>u.days>=90&&u.days<180).length,'90~179일','#ea580c','')}
      ${scard(vakas.filter(u=>u.days>=30&&u.days<90).length,'30~89일','#d97706','')}
      ${scard(vakas.filter(u=>u.days<30).length,'30일 미만','#16a34a','')}
    </div>`;
    if(vakas.length){
      html+=`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>순위</th><th>동·호수</th><th>상태</th><th>공가일수</th><th>전출일</th><th>불가사유</th><th>담당자</th></tr></thead><tbody>`;
      vakas.forEach((u,i)=>{
        const bg=u.days>=180?'background:#fff5f5':u.days>=90?'background:#fffbeb':'';
        html+=`<tr style="${bg}">
          <td style="font-weight:800">${i+1}</td>
          <td class="mono" style="font-weight:900;color:var(--accent)">${u.dong} ${u.uid}호</td>
          <td><span class="badge ${u.status==='공가'?'badge-ga':'badge-bul'}">${u.status==='공가'?'공급가능':'공급불가'}</span></td>
          <td>${daysBadge(u.days)}</td>
          <td class="mono" style="font-size:11px">${u.outdate||'-'}</td>
          <td class="left" style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.reason||'-'}</td>
          <td style="font-size:11px">${u.staff||'-'}</td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    }
    html+=`</div>`;
  }

  // 코티스 장기 미처리
  if(kotisAll.length){
    const inprog=kotisAll.filter(k=>{ const c=kotisClass(k.status); return c==='wip'||c==='wait'; });
    const longList=[];
    inprog.forEach(k=>{
      const rec=(k.recDate||'').replace(/[^0-9]/g,'').slice(0,8);
      if(rec.length===8){
        const rd=new Date(rec.slice(0,4)+'-'+rec.slice(4,6)+'-'+rec.slice(6,8));
        const d=Math.floor((new Date()-rd)/86400000);
        if(d>=30) longList.push({...k,elapsed:d});
      }
    });
    longList.sort((a,b)=>b.elapsed-a.elapsed);
    if(longList.length){
      html+=`<div class="section"><div class="section-title">🚨 코티스 장기 미처리 (30일+)</div>
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>경과일</th><th>동·호수</th><th>접수번호</th><th>상태</th><th>하자내용</th><th>담당자</th></tr></thead><tbody>`;
      longList.slice(0,50).forEach(k=>{
        const bg=k.elapsed>=180?'background:#fff5f5':k.elapsed>=90?'background:#fffbeb':'';
        html+=`<tr style="${bg}">
          <td>${daysBadge(k.elapsed)}</td>
          <td class="mono" style="font-weight:800">${k.dong}동 ${k.ho}호</td>
          <td class="mono" style="font-size:10px;color:var(--text3)">${k.seqNo}</td>
          <td><span class="badge badge-wip">${k.status||'-'}</span></td>
          <td class="left" style="font-size:11px">${(k.content||'-').slice(0,30)}</td>
          <td style="font-size:11px">${k.manager||'-'}</td>
        </tr>`;
      });
      html+=`</tbody></table></div></div>`;
    }
  }

  if(!html) html=noData('데이터를 불러오세요');
  el.innerHTML=html;
}

// ═══════════════════════════════════════
// 📈 추이분석
// ═══════════════════════════════════════
function renderTrend(){
  const el=document.getElementById('tab-trend-content');
  const kotisAll=Object.values(kotisData).flat();
  if(!kotisAll.length){ el.innerHTML=noData('코티스 엑셀을 업로드하면 추이를 분석할 수 있어요'); return; }

  // firstSeen 기준 월별 신규접수
  const monthMap={};
  kotisAll.forEach(k=>{
    const ds=k.firstSeen||k.recDate||'';
    const m=ds.slice(0,7);
    if(!m||m.length<7) return;
    if(!monthMap[m]) monthMap[m]={new:0,done:0,total:0};
    monthMap[m].total++;
    if(k.firstSeen===k.lastSeen||!k.lastSeen) monthMap[m].new++;
    if(kotisClass(k.lastStatus||k.status)==='done') monthMap[m].done++;
  });
  const months=Object.keys(monthMap).sort();
  if(!months.length){ el.innerHTML=noData('날짜 정보가 없어요'); return; }
  const maxV=Math.max(...months.map(m=>monthMap[m].total),1);

  let rows='';
  months.forEach((m,i)=>{
    const d=monthMap[m];
    const prev=i>0?monthMap[months[i-1]]:null;
    const diff=prev?d.total-prev.total:null;
    const diffStr=diff===null?'-':diff>0?`<span style="color:#dc2626">+${diff}</span>`:`<span style="color:#16a34a">${diff}</span>`;
    rows+=`<tr>
      <td class="mono" style="font-weight:800">${m}</td>
      <td style="font-weight:800">${d.total}</td>
      <td style="color:#16a34a;font-weight:700">${d.new}</td>
      <td style="color:#2563eb;font-weight:700">${d.done}</td>
      <td>${diffStr}</td>
      <td style="min-width:100px"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.total/maxV*100)}%;background:#2563eb"></div></div></td>
    </tr>`;
  });
  el.innerHTML=`<div class="section"><div class="section-title">📈 월별 하자 추이</div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th>월</th><th>누적건수</th><th>신규</th><th>완료</th><th>전월 대비</th><th>시각화</th>
  </tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ═══════════════════════════════════════
// 🔗 공가+하자 연계
// ═══════════════════════════════════════
function renderLink(){
  const el=document.getElementById('tab-link-content');
  if(!appData||!Object.keys(kotisData).length){ el.innerHTML=noData('공가앱 + 코티스 데이터가 모두 필요합니다'); return; }
  const units=collectUnits().filter(u=>u.status==='공가'||u.status==='불가');
  const rows=[];
  units.forEach(u=>{
    const key=u.dong+'_'+u.uid;
    const kItems=kotisData[key]||[];
    const inprog=kItems.filter(k=>{ const c=kotisClass(k.status); return c==='wip'||c==='wait'; });
    rows.push({...u,kotisTotal:kItems.length,kotisInprog:inprog.length,
      lastContent:inprog[0]?.content||kItems[0]?.content||'-',
      lastMgr:inprog[0]?.manager||kItems[0]?.manager||'-'});
  });
  rows.sort((a,b)=>(b.kotisInprog-a.kotisInprog)||(b.days||0)-(a.days||0));

  let trows='';
  rows.forEach(u=>{
    trows+=`<tr>
      <td class="mono" style="font-weight:900;color:var(--accent)">${u.dong} ${u.uid}호</td>
      <td><span class="badge ${u.status==='공가'?'badge-ga':'badge-bul'}">${u.status==='공가'?'공급가능':'공급불가'}</span></td>
      <td>${u.days!=null?daysBadge(u.days):'-'}</td>
      <td style="font-weight:800;color:${u.kotisInprog>0?'#dc2626':'#16a34a'}">${u.kotisInprog}건</td>
      <td>${u.kotisTotal}</td>
      <td class="left" style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.lastContent}</td>
      <td style="font-size:11px">${u.lastMgr}</td>
    </tr>`;
  });
  el.innerHTML=`<div class="section"><div class="section-title">🔗 공가 세대 하자 연계 현황</div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr>
    <th>동·호수</th><th>공가상태</th><th>공가일수</th><th>미처리하자</th><th>전체하자</th><th>최근하자내용</th><th>담당자</th>
  </tr></thead><tbody>${trows}</tbody></table></div></div>`;
}
