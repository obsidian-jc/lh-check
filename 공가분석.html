<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBjnICflVU6VTAfcTxbCaKEb2DbZLuHddM",
    authDomain: "yuljeong7-3e56b.firebaseapp.com",
    projectId: "yuljeong7-3e56b",
    storageBucket: "yuljeong7-3e56b.firebasestorage.app",
    messagingSenderId: "245660321597",
    appId: "1:245660321597:web:04a21998831221b9ade754"
  };
  const app = initializeApp(firebaseConfig);
  const fsdb = getFirestore(app);
  // 공가앱 데이터 불러오기 (한 번만)
  window.loadFromFirebase = async function(){
    try{
      const snap = await getDoc(doc(fsdb,'aptData','main'));
      if(snap.exists()) return JSON.parse(snap.data().db||'{}');
    }catch(e){ console.warn('Firebase 오류:',e); }
    return null;
  };
  // 실시간 구독 (onSnapshot) - 공가앱 변경 즉시 반영
  window.subscribeFirebase = function(callback){
    return onSnapshot(doc(fsdb,'aptData','main'), function(snap){
      if(snap.exists()){
        try{
          var data = JSON.parse(snap.data().db||'{}');
          callback(data);
        }catch(e){ console.warn('실시간 파싱 오류:',e); }
      }
    }, function(e){ console.warn('실시간 구독 오류:',e); });
  };
  // 코티스 날짜별 스냅샷 저장
  window.saveKotisToFirebase = async function(dateKey, data, parsed, unitCnt){
    try{
      await setDoc(doc(fsdb,'kotisHistory', dateKey), {
        data: JSON.stringify(data),
        savedAt: new Date().toISOString(),
        dateKey: dateKey,
        parsed: parsed,
        unitCnt: unitCnt
      });
      return true;
    }catch(e){ console.warn('코티스 저장 오류:',e); return false; }
  };

  // 코티스 누적 합산 저장 (seqNo 기준으로 전체 이력 머지)
  window.mergeKotisToAccumulated = async function(dateKey, newData){
    try{
      // 기존 누적 데이터 불러오기
      var accSnap = await getDoc(doc(fsdb,'kotisAccumulated','main'));
      var acc = {};
      if(accSnap.exists()){
        try{ acc = JSON.parse(accSnap.data().data||'{}'); }catch(e){}
      }
      // 새 데이터를 seqNo 기준으로 머지
      var updatedCount = 0;
      var newCount = 0;
      Object.keys(newData).forEach(function(key){
        var items = newData[key];
        if(!acc[key]) acc[key] = {};
        items.forEach(function(item){
          if(!item.seqNo) return;
          var existing = acc[key][item.seqNo];
          if(!existing){
            // 신규 접수번호 — 최초 발견일 기록
            acc[key][item.seqNo] = Object.assign({}, item, {
              firstSeen: dateKey,
              lastSeen: dateKey,
              lastStatus: item.status
            });
            newCount++;
          } else {
            // 기존 — 상태 업데이트 및 마지막 확인일 갱신
            acc[key][item.seqNo] = Object.assign({}, existing, item, {
              firstSeen: existing.firstSeen,
              lastSeen: dateKey,
              lastStatus: item.status
            });
            updatedCount++;
          }
        });
      });
      // 저장
      await setDoc(doc(fsdb,'kotisAccumulated','main'), {
        data: JSON.stringify(acc),
        updatedAt: new Date().toISOString(),
        lastDateKey: dateKey
      });
      return { newCount: newCount, updatedCount: updatedCount };
    }catch(e){ console.warn('누적 저장 오류:',e); return null; }
  };

  // 누적 합산 데이터 불러오기
  window.loadKotisAccumulated = async function(){
    try{
      var snap = await getDoc(doc(fsdb,'kotisAccumulated','main'));
      if(snap.exists()){
        var raw = JSON.parse(snap.data().data||'{}');
        // 형식 변환: {key: {seqNo: item}} → {key: [item, ...]}
        var result = {};
        Object.keys(raw).forEach(function(key){
          result[key] = Object.values(raw[key]);
        });
        return { data: result, updatedAt: snap.data().updatedAt, lastDateKey: snap.data().lastDateKey };
      }
    }catch(e){ console.warn('누적 불러오기 오류:',e); }
    return null;
  };
  // 코티스 날짜 목록 불러오기
  window.loadKotisDates = async function(){
    try{
      const q = query(collection(fsdb,'kotisHistory'), orderBy('dateKey','desc'));
      const snap = await getDocs(q);
      return snap.docs.map(d=>({ dateKey:d.data().dateKey, savedAt:d.data().savedAt, parsed:d.data().parsed, unitCnt:d.data().unitCnt }));
    }catch(e){ console.warn('코티스 날짜 오류:',e); return []; }
  };
  // 특정 날짜 코티스 불러오기
  window.loadKotisByDate = async function(dateKey){
    try{
      const snap = await getDoc(doc(fsdb,'kotisHistory', dateKey));
      if(snap.exists()) return JSON.parse(snap.data().data||'{}');
    }catch(e){ console.warn('코티스 날짜별 오류:',e); }
    return null;
  };
  // 누적 이력 초기화
  window._resetKotisAccumulated = async function(){
    const {deleteDoc} = await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js");
    await deleteDoc(doc(fsdb,'kotisAccumulated','main'));
  };
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebaseReady'));
</script>

<script>

const BLDGS = {

  "707동":{total:80,floors:14,upf:6,unitTypes:{1:"51A",2:"51A",3:"46A",4:"46A",5:"46A",6:"46A"}},

// 여러 파일 순차 처리
function loadKotisMultiFiles(files){
  // 파일명 기준 정렬 (오래된 순)
  files.sort(function(a,b){return a.name.localeCompare(b.name);});
  var total=files.length;
  var done=0;
  var totalNew=0, totalUpdated=0;

  // 진행 상태 표시
  var infoEl=document.getElementById("infoKotis");
  infoEl.textContent="⏳ 0/"+total+" 처리중...";
  document.getElementById("dropKotis").style.borderColor="#f97316";

  function processNext(idx){
    if(idx>=total){
      // 모두 완료
      document.getElementById("dropKotis").classList.add("loaded");
      infoEl.textContent="✅ "+total+"개 파일 완료 · 신규 "+totalNew+"건 · 업데이트 "+totalUpdated+"건";
      showToast("🎉 "+total+"개 파일 누적 완료! 신규 "+totalNew+"건 추가");
      loadAccumulatedAndRender();
      return;
    }
    var file=files[idx];
    infoEl.textContent="⏳ ("+(idx+1)+"/"+total+") "+file.name+" 처리중...";

    var r=new FileReader();
    r.onload=function(ev){
      try{
        var wb=XLSX.read(ev.target.result,{type:"array"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        var items=parseKotisRows(rows);
        var cnt=Object.keys(items).length;
        var parsed=Object.values(items).reduce(function(s,v){return s+v.length;},0);

        // 날짜키 추출 (파일명에서 또는 오늘)
        var dk=getKotisDateKey(file.name);

        // 디버그: 파싱 결과 확인
        var sampleKeys=Object.keys(items).slice(0,3);
        var sampleInfo=sampleKeys.map(function(k){return k+":"+(items[k]&&items[k][0]&&items[k][0].seqNo||"seqNo없음");}).join(", ");
        dbLog("[파싱] "+file.name+" → "+cnt+"세대/"+parsed+"건");
        dbLog("[샘플] "+sampleInfo);

        function tryFbSave(n){
          if(window.saveKotisToFirebase && window.mergeKotisToAccumulated){
            window.saveKotisToFirebase(dk,items,parsed,cnt).then(function(){
              window.mergeKotisToAccumulated(dk, items).then(function(result){
                if(result){
                  totalNew+=result.newCount;
                  totalUpdated+=result.updatedCount;
                  dbLog("[저장OK] 신규 "+result.newCount+"건 · 업데이트 "+result.updatedCount+"건");
                } else {
                  dbLog("[경고] mergeKotis 결과 null — Firebase 오류 가능성");
                }
                done++;
                processNext(idx+1);
              }).catch(function(e){
                dbLog("[오류] merge: "+e.message);
                done++; processNext(idx+1);
              });
            }).catch(function(e){
              dbLog("[오류] save: "+e.message);
              done++; processNext(idx+1);
            });
          } else if(n<20){ setTimeout(function(){tryFbSave(n+1);},200); }
          else { dbLog("[경고] Firebase 함수 준비 안됨 (20회 초과)"); done++; processNext(idx+1); }
        }
        tryFbSave(0);
      }catch(err){
        console.warn("파일 오류: "+file.name, err);
        done++;
        processNext(idx+1);
      }
    };
    r.readAsArrayBuffer(file);
  }
  processNext(0);
}

// 코티스 행 파싱 공통 함수
function parseKotisRows(rows){
  var items={};
  var hdrIdx=-1;
  for(var i=0;i<Math.min(rows.length,10);i++){
    var r2=rows[i].map(function(v){return String(v||"");});
    if(r2.some(function(v){return v.includes("동");})){hdrIdx=i;break;}
  }
  if(hdrIdx<0)hdrIdx=0;
  var hdr=rows[hdrIdx].map(function(v){return String(v||"").trim();});
  function findCol(keys){return hdr.findIndex(function(h){return keys.some(function(k){return h.includes(k);});});}
  // 동 컬럼 우선순위: 순수 '동' 컬럼(숫자값) > '단지 및 동주소'(문자값)
  var ciDongPure=findCol(["동"]);   // 순수 동번호 컬럼 (값: 714, 714.0)
  var ciDongAddr=findCol(["단지 및 동주소","동주소"]); // 주소형 컬럼 (값: 양주옥정7 714동)
  var ci={
    dong: ciDongPure>=0 ? ciDongPure : ciDongAddr,
    dongAddr: ciDongAddr,  // 주소형 보조 컬럼
    ho:findCol(["호"]),
    seqNo:findCol(["접수일련번호","일련번호","접수번호"]),
    recDate:findCol(["하자접수일","접수일","접수일자"]),
    status:findCol(["하자진행상태","처리상태","상태"]),
    content:findCol(["하자내용","내용"]),
    manager:findCol(["LH담당자","담당자","처리자"]),
    compDate:findCol(["보수완료일","완료일","처리완료"])
  };
  // 동번호 추출 헬퍼: 숫자(714, 714.0)와 문자(701동, 양주옥정7 701동) 모두 처리
  function parseDong(raw){
    if(!raw) return null;
    // 숫자형: 714 또는 714.0
    var numMatch=raw.match(/^(\d{3})(?:\.0+)?$/);
    if(numMatch) return parseInt(numMatch[1])+"동";
    // 문자형: "701동" 또는 "양주옥정율정마을7단지 701동"
    var dongMatch=raw.match(/(\d{3})\s*동/);
    if(dongMatch) return parseInt(dongMatch[1])+"동";
    return null;
  }
  for(var i2=hdrIdx+1;i2<rows.length;i2++){
    var row=rows[i2];
    var dongRaw=ci.dong>=0?String(row[ci.dong]||"").trim():"";
    var hoRaw=ci.ho>=0?String(row[ci.ho]||"").trim():"";
    if(!dongRaw||!hoRaw)continue;
    var dong=parseDong(dongRaw);
    // 순수 동 컬럼에서 못 찾으면 주소 컬럼에서 재시도
    if(!dong && ci.dongAddr>=0){
      var addrRaw=String(row[ci.dongAddr]||"").trim();
      dong=parseDong(addrRaw);
    }
    if(!dong)continue;
    var ho=parseInt(hoRaw.replace(/[^0-9]/g,""));
    if(!BLDGS[dong]||isNaN(ho)||ho<=0)continue;
    var seqNo=ci.seqNo>=0?String(row[ci.seqNo]||"").trim():"";
    if(!seqNo)continue;
    var recDate=ci.recDate>=0?String(row[ci.recDate]||"").trim():"";
    var status=ci.status>=0?String(row[ci.status]||"").trim():"";
    var content=ci.content>=0?String(row[ci.content]||"").trim():"";
    var manager=ci.manager>=0?String(row[ci.manager]||"").trim():"";
    var compDate=ci.compDate>=0?String(row[ci.compDate]||"").trim():"";
    var key=dong+"_"+ho;
    if(!items[key])items[key]=[];
    items[key].push({seqNo:seqNo,dong:dong,ho:ho,recDate:recDate,status:status,content:content,manager:manager,compDate:compDate});
  }
  return items;
}
function loadKotisFile(file){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      var items=parseKotisRows(rows);
      kotisData=items;
      var cnt=Object.keys(items).length;
      var parsed=Object.values(items).reduce(function(s,v){return s+v.length;},0);
      document.getElementById("dropKotis").classList.add("loaded");
      document.getElementById("infoKotis").textContent="✅ "+cnt+"세대 / "+parsed+"건 연동";
      showToast("📡 코티스 "+parsed+"건 불러오기 완료!");
      var dk=getKotisDateKey(file.name);
      function tryFbSave(n){
        if(window.saveKotisToFirebase && window.mergeKotisToAccumulated){
          window.saveKotisToFirebase(dk,items,parsed,cnt).then(function(ok){
            if(ok){
              window.mergeKotisToAccumulated(dk, items).then(function(result){
                if(result){
                  showToast("☁️ 저장 완료! 신규 "+result.newCount+"건 · 업데이트 "+result.updatedCount+"건");
                  document.getElementById("infoKotis").textContent="✅ "+cnt+"세대 / "+parsed+"건 ("+dk+") · 신규 "+result.newCount+"건";
                }
                loadAccumulatedAndRender();
              });
            }
          });
        } else if(n<20){ setTimeout(function(){tryFbSave(n+1);},200); }
        else { loadAccumulatedAndRender(); }
      }
      tryFbSave(0);
    }catch(err){alert("코티스 파일 오류: "+err.message);console.error(err);}
  };
  r.readAsArrayBuffer(file);
}

function ev(e,id,over){e.preventDefault();document.getElementById(id).classList.toggle("over",over);}
function drop(e,type){
  e.preventDefault();
  var id=type==="app"?"dropApp":"dropKotis";
  document.getElementById(id).classList.remove("over");
  if(type==="app"){
    var file=e.dataTransfer.files[0];if(!file)return;
    loadAppFile(file);
  } else {
    var files=Array.from(e.dataTransfer.files).filter(function(f){return f.name.match(/\.xls[x]?$/i);});
    if(!files.length)return;

  }

// ── 데이터 수집
function collectUnits(){
  var units=[];
  Object.keys(BLDGS).forEach(function(dong){
    var bldg=BLDGS[dong];
    var d=appData[dong]||{};
    for(var f=bldg.floors;f>=1;f--){
      for(var u=1;u<=bldg.upf;u++){
        var uid=f+String(u).padStart(2,"0");
        var data=d[uid];
        var ho=parseInt(uid2ho(uid));
        var status=data?data.status:"empty";
        var utype=data&&data.unitType?data.unitType:getUnitType(dong,uid);
        var key=dong+"_"+ho;
        var kItems=kotisData[key]||[];
        var days=data&&data.outdate?calcDays(data.outdate):null;
        units.push({dong,uid,ho,status,outdate:data?data.outdate:"",reason:data?data.reason:"",staff:data?data.staff:"",unitType:utype,days,kotis:kItems,data:data||{}});
      }
    }
  });
  return units;
}

// 📈 추이 분석 탭
// ═══════════════════════════════════════════
function renderTrend(){
  var el=document.getElementById("tab-trend-content");
  el.innerHTML="<div class='section'><div class='section-title'>📈 코티스 미처리 추이</div><div id='trendBody'><div style='text-align:center;padding:30px;color:var(--text3)'>불러오는 중...</div></div></div>";
  function tryLoad(n){
    if(window.loadKotisDates){
      window.loadKotisDates().then(function(dates){
        var body=document.getElementById("trendBody");
        if(!dates||!dates.length){
          body.innerHTML="<div style='text-align:center;padding:30px;color:var(--text3)'>코티스 이력이 없어요.<br>코티스 엑셀을 업로드하면 자동으로 쌓여요.</div>";
          return;
        }
        // 날짜별 미처리 건수 로드 후 그래프
        var sorted=dates.slice().reverse(); // 오래된 순
        var promises=sorted.map(function(d){
          return window.loadKotisByDate(d.dateKey).then(function(data){
            if(!data)return {dateKey:d.dateKey,total:0,wip:0,done:0};
            var all=Object.values(data).reduce(function(a,b){return a.concat(b);},[]);
            var wip=all.filter(function(k){var c=kotisClass(k.status);return c==="wip"||c==="wait";}).length;
            var done=all.filter(function(k){return kotisClass(k.status)==="done";}).length;
            return {dateKey:d.dateKey,total:all.length,wip:wip,done:done};
          });
        });
        Promise.all(promises).then(function(results){
          if(!results.length){body.innerHTML="<div style='padding:20px;text-align:center;color:var(--text3)'>데이터 없음</div>";return;}
          var maxWip=Math.max.apply(null,results.map(function(r){return r.wip;}));
          var html="";
          // 요약 카드
          if(results.length>=2){
            var last=results[results.length-1];
            var prev=results[results.length-2];
            var diff=last.wip-prev.wip;
            var diffLabel=diff>0?"▲ "+diff+"건 증가":diff<0?"▼ "+Math.abs(diff)+"건 감소":"변동 없음";
            var diffColor=diff>0?"#dc2626":diff<0?"#16a34a":"#64748b";
            html+="<div class='summary-grid' style='margin-bottom:16px'>";
            html+=scard(last.wip,"현재 미처리",diffColor,"");
            html+="<div class='scard'><div class='scard-num' style='color:"+diffColor+"'>"+diffLabel+"</div><div class='scard-label'>전회 대비</div></div>";
            html+=scard(results.length,"누적 이력","#2563eb","회");
            html+=scard(last.total,"전체 하자","#475569","건");
            html+="</div>";
          }
          // 바 그래프
          html+="<div style='overflow-x:auto'><table class='tbl'>";
          html+="<thead><tr><th>날짜</th><th>미처리</th><th>완료</th><th>전체</th><th style='min-width:200px'>미처리 추이</th><th>전회 대비</th></tr></thead><tbody>";
          results.forEach(function(r,i){
            var prev2=i>0?results[i-1]:null;
            var diff2=prev2!=null?r.wip-prev2.wip:null;
            var diffTxt=diff2===null?"-":diff2>0?"<span style='color:#dc2626;font-weight:800'>▲"+diff2+"</span>":diff2<0?"<span style='color:#16a34a;font-weight:800'>▼"+Math.abs(diff2)+"</span>":"<span style='color:#64748b'>-</span>";
            var barW=maxWip>0?Math.round(r.wip/maxWip*100):0;
            var barColor=r.wip>=(maxWip*0.8)?"#dc2626":r.wip>=(maxWip*0.5)?"#ea580c":"#2563eb";
            var isLatest=i===results.length-1;
            html+="<tr style='"+(isLatest?"background:#eff6ff;font-weight:800":"")+"'>";
            html+="<td class='mono' style='font-weight:800;color:var(--accent)'>"+r.dateKey+(isLatest?" <span style='font-size:9px;background:#dbeafe;color:#1d4ed8;padding:1px 5px;border-radius:4px'>최신</span>":"")+"</td>";
            html+="<td class='mono' style='font-weight:800;color:"+barColor+"'>"+r.wip+"건</td>";
            html+="<td class='mono' style='color:var(--green)'>"+r.done+"건</td>";
            html+="<td class='mono' style='color:var(--text3)'>"+r.total+"건</td>";
            html+="<td><div class='bar-wrap'><div class='bar-bg'><div class='bar-fill' style='width:"+barW+"%;background:"+barColor+"'></div></div><span style='font-size:11px;font-weight:700;min-width:28px'>"+r.wip+"</span></div></td>";
            html+="<td>"+diffTxt+"</td>";
            html+="</tr>";
          });
          html+="</tbody></table></div>";
          body.innerHTML=html;
        });
      });
    } else if(n<20){ setTimeout(()=>tryLoad(n+1),200); }
    else { document.getElementById("trendBody").innerHTML="<div style='padding:20px;text-align:center;color:var(--red)'>Firebase 연결 안됨</div>"; }
  }
  tryLoad(0);
}

function histFilterUnit(){
  var dong=document.getElementById("histDongSel").value;
  var unitSel=document.getElementById("histUnitSel");
  unitSel.innerHTML="<option value=''>호수 선택</option>";
  if(!dong)return;
  if(appData){
    var units=collectUnits();
    units.filter(function(u){return u.dong===dong&&(u.status==="공가"||u.status==="불가");})
      .sort(function(a,b){return a.ho-b.ho;})
      .forEach(function(u){
        var opt=document.createElement("option");
        opt.value=u.ho; opt.textContent=uid2ho(u.uid)+"호";
        unitSel.appendChild(opt);
      });
  } else {
    // 코티스 기준으로 호수 목록
    var hoSet=[...new Set(
      Object.keys(kotisData)
        .filter(function(k){return k.startsWith(dong+"_");})
        .map(function(k){return parseInt(k.split("_")[1]);})
    )].sort(function(a,b){return a-b;});
    hoSet.forEach(function(ho){
      var opt=document.createElement("option");
      opt.value=ho; opt.textContent=ho+"호";
      unitSel.appendChild(opt);
    });
  }
}

function histShowUnit(){
  var dong=document.getElementById("histDongSel").value;
  var ho=document.getElementById("histUnitSel").value;
  if(!dong||!ho)return;
  showUnitHistory(dong, parseInt(ho));
}

function histSearchUnit(){
  var q=document.getElementById("histSearch").value.trim();
  var m=q.match(/(\d{3})\s*동?\s*(\d{3,4})/);
  if(!m)return;
  var dong=parseInt(m[1])+"동";
  var ho=parseInt(m[2]);
  if(!BLDGS[dong])return;
  showUnitHistory(dong, ho);
}

  function tryLoad(n){
    if(window.loadKotisAccumulated){
      // 누적 데이터 우선 사용 — 빠르고 완전함
      window.loadKotisAccumulated().then(function(result){
        if(result && result.data && Object.keys(result.data).length > 0){
          // 누적 데이터를 historyAllDates 형식으로 변환
          // 각 세대별 seqNo → firstSeen/lastSeen 기반으로 타임라인 구성
          var accData = result.data;
          // historyAllDates는 날짜별 구조이므로 누적 데이터를 세대별 타임라인으로 직접 저장
          historyAccumulated = accData;
          historyLoaded = true;
          var totalItems = Object.values(accData).reduce(function(s,v){return s+v.length;},0);
          sb.textContent="✅ 누적 이력 로드 완료! "+Object.keys(accData).length+"세대 / "+totalItems+"건 (최종: "+result.lastDateKey+")";
          sb.style.background="#dcfce7"; sb.style.color="#15803d";
          renderWeeklyChange();
          showToast("✅ 누적 이력 "+totalItems+"건 로드 완료!");
        } else {
          sb.textContent="⚠️ 누적 이력이 없어요. 코티스 엑셀을 업로드하면 자동으로 쌓여요.";
          sb.style.background="#fef3c7"; sb.style.color="#b45309";
        }
      }).catch(function(){ sb.textContent="❌ 누적 데이터 로드 실패"; });
    } else if(n<20){ setTimeout(function(){tryLoad(n+1);},200); }
    else { sb.textContent="❌ Firebase 연결 실패"; }
  }
  tryLoad(0);
}

function showUnitHistory(dong, ho){
  var el=document.getElementById("histResult");
  var key=dong+"_"+ho;
  var hoStr=String(ho);

  // 현재 공가앱 데이터
  var units=collectUnits();
  var unit=units.find(function(u){return u.dong===dong&&u.ho===ho;});
  var unitStatus=unit?unit.status:"미등록";
  var unitDays=unit?unit.days:null;

  var html="";

  // 세대 헤더
  var stColor=unitStatus==="공가"?"#b45309":unitStatus==="불가"?"#dc2626":unitStatus==="입주"?"#16a34a":"#64748b";
  html+="<div style='background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap'>";
  html+="<div style='font-size:20px;font-weight:900;color:var(--accent);font-family:JetBrains Mono,monospace'>"+dong+" "+hoStr+"호</div>";
  if(unit){
    html+="<span class='badge' style='background:"+stColor+"20;color:"+stColor+";border:1.5px solid "+stColor+"40;font-size:12px'>"+unitStatus+"</span>";
    if(unitDays!=null) html+="<span style='font-size:12px;color:var(--text3)'>공가 "+unitDays+"일</span>";
    if(unit.reason) html+="<span style='font-size:11px;color:var(--red)'>"+unit.reason.slice(0,30)+"</span>";
  }
  html+="</div>";

  // 현재 코티스 하자 현황
  var kItems=kotisData[key]||[];
  if(kItems.length){
    html+="<div class='section' style='margin-bottom:12px'>";
    html+="<div class='section-title' style='font-size:12px'>📡 현재 하자 현황 ("+kItems.length+"건)</div>";
    html+="<table class='tbl'><thead><tr><th>접수번호</th><th>접수일</th><th>상태</th><th>하자내용</th><th>담당자</th></tr></thead><tbody>";
    kItems.forEach(function(k){
      var cls=kotisClass(k.status);
      html+="<tr><td class='mono' style='font-size:10px'>"+k.seqNo+"</td>";
      html+="<td class='mono' style='font-size:11px'>"+k.recDate+"</td>";
      html+="<td><span class='badge badge-"+cls+"'>"+k.status+"</span></td>";
      html+="<td class='left' style='font-size:11px'>"+(k.content||"-").slice(0,40)+"</td>";
      html+="<td style='font-size:11px'>"+(k.manager||"-")+"</td></tr>";
    });
    html+="</tbody></table></div>";
  } else {
    html+="<div style='padding:10px;background:var(--greenbg);border-radius:8px;font-size:12px;color:var(--green);font-weight:700;margin-bottom:12px'>✅ 현재 하자 접수 없음</div>";
  }

  // 누적 이력 타임라인 (historyAccumulated 우선)
  var accItems = historyAccumulated[key] || [];

  if(!historyLoaded || !accItems.length){
    if(!historyLoaded){
      html+="<div style='padding:16px;background:var(--bluebg);border-radius:10px;font-size:12px;color:var(--blue);font-weight:600'>";
      html+="💡 위의 <b>이력 로드</b> 버튼을 누르면 날짜별 타임라인을 볼 수 있어요.</div>";
    } else {
      html+="<div style='padding:16px;text-align:center;color:var(--text3);font-size:12px'>이 세대의 누적 하자 접수 기록이 없어요</div>";
    }
    el.innerHTML=html;
    return;
  }

  // accItems: [{seqNo, content, recDate, manager, firstSeen, lastSeen, lastStatus, status, ...}]
  var seqList = accItems.slice().sort(function(a,b){
    return (a.recDate||a.firstSeen||"").localeCompare(b.recDate||b.firstSeen||"");
  });

  var doneCnt = seqList.filter(function(s){return kotisClass(s.lastStatus||s.status)==="done";}).length;
  var wipCnt = seqList.filter(function(s){var c=kotisClass(s.lastStatus||s.status);return c==="wip"||c==="wait";}).length;

  html+="<div class='section'>";
  html+="<div class='section-title'>📅 하자 누적 이력 ("+seqList.length+"건 · 완료 "+doneCnt+" · 진행중 "+wipCnt+")</div>";

  // 요약 바
  if(seqList.length){
    html+="<div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px'>";
    html+="<span style='background:#dcfce7;color:#16a34a;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800'>✅ 완료 "+doneCnt+"건</span>";
    html+="<span style='background:#fef3c7;color:#b45309;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800'>🔧 진행중 "+wipCnt+"건</span>";
    html+="<span style='background:#ede9fe;color:#7c3aed;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800'>📋 전체 "+seqList.length+"건</span>";
    html+="</div>";
  }

  seqList.forEach(function(seq){
    var lastStatus = seq.lastStatus || seq.status || "";
    var cls = kotisClass(lastStatus);
    var isDone = cls === "done";
    var firstSeen = seq.firstSeen || seq.recDate || "-";
    var lastSeen = seq.lastSeen || "-";

    // 처리 소요일 계산 (firstSeen → lastSeen)
    var soyo = null;
    if(firstSeen !== "-" && lastSeen !== "-" && isDone){
      var fd = new Date(firstSeen), ld = new Date(lastSeen);
      soyo = Math.floor((ld - fd) / 86400000);
    }
    // 현재까지 경과일 (미완료)
    var elapsed = null;
    if(!isDone && firstSeen !== "-"){
      elapsed = Math.floor((new Date() - new Date(firstSeen)) / 86400000);
    }

    var borderColor = isDone ? "#22c55e" : elapsed >= 60 ? "#dc2626" : elapsed >= 30 ? "#ea580c" : "#fbbf24";
    var bgColor = isDone ? "#f0fdf4" : elapsed >= 60 ? "#fff5f5" : "#fffbeb";

    html+="<div style='border:1.5px solid "+borderColor+";border-radius:10px;padding:12px 14px;margin-bottom:10px;background:"+bgColor+"'>";
    html+="<div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px'>";
    html+="<span class='mono' style='font-size:10px;color:var(--text3)'>"+seq.seqNo+"</span>";
    html+="<span style='font-size:13px;font-weight:800;flex:1'>"+(seq.content||"내용없음").slice(0,35)+"</span>";
    html+="<span class='badge badge-"+cls+"'>"+lastStatus+"</span>";
    if(soyo != null) html+="<span style='font-size:11px;color:#16a34a;font-weight:700'>✅ 처리 "+soyo+"일</span>";
    if(elapsed != null) html+="<span style='font-size:11px;color:"+(elapsed>=60?"#dc2626":"#ea580c")+";font-weight:800'>⏱ "+elapsed+"일 경과</span>";
    html+="</div>";
    html+="<div style='font-size:11px;color:var(--text3)'>";
    html+="최초발견: <b>"+firstSeen+"</b>";
    if(lastSeen !== firstSeen) html+=" · 마지막확인: <b>"+lastSeen+"</b>";
    html+=" · 담당: "+(seq.manager||"-");
    html+="</div>";
    html+="</div>";
  });
  html+="</div>";

  el.innerHTML=html;
}

function renderWeeklyChange(){
  var sec=document.getElementById("histWeeklySection");
  var el=document.getElementById("histWeekly");
  // 누적 데이터 기반 요약 표시
  if(!historyAccumulated || !Object.keys(historyAccumulated).length){sec.style.display="none";return;}
  sec.style.display="block";

  // 누적 데이터에서 전체 통계
  var allItems = Object.values(historyAccumulated).reduce(function(a,b){return a.concat(b);}, []);
  var doneCnt = allItems.filter(function(k){return kotisClass(k.lastStatus||k.status)==="done";}).length;
  var wipCnt = allItems.filter(function(k){var c=kotisClass(k.lastStatus||k.status);return c==="wip"||c==="wait";}).length;
  var totalCnt = allItems.length;

  // 처리 소요일 통계 (완료된 건만)
  var soyoDays = [];
  allItems.forEach(function(k){
    if(kotisClass(k.lastStatus||k.status)==="done" && k.firstSeen && k.lastSeen){
      var d = Math.floor((new Date(k.lastSeen) - new Date(k.firstSeen)) / 86400000);
      if(d >= 0) soyoDays.push(d);
    }
  });
  var avgSoyo = soyoDays.length ? Math.round(soyoDays.reduce(function(a,b){return a+b;},0)/soyoDays.length) : null;

  var html = "<div class='summary-grid' style='margin-bottom:12px'>";
  html += "<div class='scard'><div class='scard-num' style='color:#ea580c'>"+wipCnt+"</div><div class='scard-label'>현재 미처리</div><div class='scard-sub'>건</div></div>";
  html += "<div class='scard'><div class='scard-num' style='color:#16a34a'>"+doneCnt+"</div><div class='scard-label'>누적 완료</div><div class='scard-sub'>건</div></div>";
  html += "<div class='scard'><div class='scard-num' style='color:#2563eb'>"+totalCnt+"</div><div class='scard-label'>전체 누적</div><div class='scard-sub'>건</div></div>";
  if(avgSoyo != null) html += "<div class='scard'><div class='scard-num' style='color:#7c3aed'>"+avgSoyo+"일</div><div class='scard-label'>평균 처리일</div><div class='scard-sub'>완료 기준</div></div>";
  html += "</div>";
  el.innerHTML = html;
  return; // 누적 데이터 기반으로 대체

  // 아래는 날짜별 스냅샷 기반 (비활성)
  if(!historyAllDates||historyAllDates.length<2){return;}

  // 날짜별 신규접수/완료/진행중 집계
  var results=historyAllDates.map(function(d,i){
    var allItems=Object.values(d.data).reduce(function(a,b){return a.concat(b);},[]);
    var wip=allItems.filter(function(k){var c=kotisClass(k.status);return c==="wip"||c==="wait";}).length;
    var done=allItems.filter(function(k){return kotisClass(k.status)==="done";}).length;
    var total=allItems.length;

    // 신규: 이전 날짜에 없던 seqNo
    var newCnt=0;
    if(i>0){
      var prevItems=Object.values(historyAllDates[i-1].data).reduce(function(a,b){return a.concat(b);},[]);
      var prevSeqs=new Set(prevItems.map(function(k){return k.seqNo;}));
      newCnt=allItems.filter(function(k){return !prevSeqs.has(k.seqNo);}).length;
    }
    // 완료전환: 이전엔 진행중, 이번엔 완료
    var completedCnt=0;
    if(i>0){
      var prevMap={};
      Object.values(historyAllDates[i-1].data).reduce(function(a,b){return a.concat(b);}).forEach(function(k){prevMap[k.seqNo]=k.status;});
      allItems.forEach(function(k){
        if(kotisClass(k.status)==="done"){
          var ps=prevMap[k.seqNo];
          if(ps&&kotisClass(ps)!=="done") completedCnt++;
        }
      });
    }
    return {dateKey:d.dateKey, total, wip, done, newCnt, completedCnt};
  });

  var html="<div style='overflow-x:auto'><table class='tbl'>";
  html+="<thead><tr><th>날짜</th><th>전체</th><th>미처리</th><th>완료</th><th>신규접수</th><th>완료전환</th><th>전회 미처리 대비</th></tr></thead><tbody>";
  results.forEach(function(r,i){
    var prev=i>0?results[i-1]:null;
    var diff=prev!=null?r.wip-prev.wip:null;
    var diffTxt=diff===null?"-":diff>0?"<span style='color:#dc2626;font-weight:800'>▲"+diff+"</span>":diff<0?"<span style='color:#16a34a;font-weight:800'>▼"+Math.abs(diff)+"</span>":"<span style='color:#64748b'>±0</span>";
    var isLatest=i===results.length-1;
    html+="<tr style='"+(isLatest?"background:#eff6ff":"")+"'>";
    html+="<td class='mono' style='font-weight:800;color:var(--accent)'>"+r.dateKey+(isLatest?" ★":"")+"</td>";
    html+="<td class='mono'>"+r.total+"</td>";
    html+="<td class='mono' style='color:#ea580c;font-weight:800'>"+r.wip+"</td>";
    html+="<td class='mono' style='color:var(--green)'>"+r.done+"</td>";
    html+="<td class='mono' style='color:#7c3aed'>"+(r.newCnt>0?"<b>+"+r.newCnt+"</b>":"-")+"</td>";
    html+="<td class='mono' style='color:var(--green)'>"+(r.completedCnt>0?"✅ "+r.completedCnt:"-")+"</td>";
    html+="<td>"+diffTxt+"</td>";
    html+="</tr>";
  });
  html+="</tbody></table></div>";
  el.innerHTML=html;
}

  el.innerHTML=html;

function exportExcel(){
  if(!appData){alert("데이터를 먼저 불러오세요.");return;}
  var units=collectUnits();
  var wb=XLSX.utils.book_new();
  var today=todayStr();

  // 시트1: 종합요약
  var s1=[["율정7단지 공가 분석 보고서","","","","","기준일: "+today],[""],
    ["구분","전체세대","공가합계","공급가능","공급불가","공가율(%)","메모"]];
  var totalAll=Object.values(BLDGS).reduce(function(s,b){return s+b.total;},0);
  var gaAll=units.filter(function(u){return u.status==="공가";}).length;
  var bulAll=units.filter(function(u){return u.status==="불가";}).length;
  s1.push(["전체",totalAll,gaAll+bulAll,gaAll,bulAll,totalAll?Math.round((gaAll+bulAll)/totalAll*100):0,""]);
  Object.keys(BLDGS).forEach(function(dong){
    var du=units.filter(function(u){return u.dong===dong;});
    var ga=du.filter(function(u){return u.status==="공가";}).length;
    var bul=du.filter(function(u){return u.status==="불가";}).length;
    var t=BLDGS[dong].total;
    s1.push([dong,t,ga+bul,ga,bul,t?Math.round((ga+bul)/t*100):0,""]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),"동별현황");

  // 시트2: 공가세대목록
  var s2=[["동","호수","평형","상태","공가일수","전출일","불가사유","담당자","메모","조치사항"]];
  units.filter(function(u){return u.status==="공가"||u.status==="불가";}).sort(function(a,b){return (b.days||0)-(a.days||0);}).forEach(function(u){
    s2.push([u.dong,uid2ho(u.uid)+"호",pyeongLabel(u.unitType),u.status==="공가"?"공급가능":"공급불가",u.days!=null?u.days:"",u.outdate?u.outdate.slice(0,10):"",u.reason||"",u.staff||"","",""]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),"공가세대목록");

  // 시트3: 장기미처리 하자
  var kotisAll=Object.values(kotisData).reduce(function(a,b){return a.concat(b);},[]);
  if(kotisAll.length){
    var s3=[["경과일","동","호수","접수번호","진행상태","하자내용","담당자","메모","처리예정일"]];
    var inProg=kotisAll.filter(function(k){var c=kotisClass(k.status);return c==="wip"||c==="wait";});
    var longL=[];
    inProg.forEach(function(k){
      var rec=(k.recDate||"").replace(/[^0-9]/g,"").slice(0,8);
      if(rec.length===8){var rd=new Date(rec.slice(0,4)+"-"+rec.slice(4,6)+"-"+rec.slice(6,8));var d=Math.floor((new Date()-rd)/86400000);if(d>=30)longL.push({k,d});}
    });
    longL.sort(function(a,b){return b.d-a.d;}).forEach(function(lp){
      s3.push([lp.d,lp.k.dong,lp.k.ho+"호",lp.k.seqNo,lp.k.status,lp.k.content||"",lp.k.manager||"","",""]);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s3),"하자장기미처리");

    // 시트4: 공가+하자 연계
    var s4=[["동","호수","공가상태","공가일수","하자완료","하자진행중","하자대기","메모","조치사항"]];
    units.filter(function(u){return (u.status==="공가"||u.status==="불가")&&u.kotis.length>0;}).forEach(function(u){
      var done=u.kotis.filter(function(k){return kotisClass(k.status)==="done";}).length;
      var wip=u.kotis.filter(function(k){return kotisClass(k.status)==="wip";}).length;
      var wait=u.kotis.filter(function(k){return kotisClass(k.status)==="wait";}).length;
      s4.push([u.dong,uid2ho(u.uid)+"호",u.status==="공가"?"공급가능":"공급불가",u.days!=null?u.days:"",done,wip,wait,"",""]);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s4),"공가+하자연계");
  }

  XLSX.writeFile(wb,"율정7단지_공가분석_"+today.replace(/-/g,"")+".xlsx");
  showToast("📥 엑셀 보고서 저장 완료!");
}

  document.getElementById("infoApp").textContent="";
  document.getElementById("infoKotis").textContent="";

  document.getElementById("btnPrint").disabled=true;

  document.getElementById("tab-summary-content").innerHTML=noData();
}
